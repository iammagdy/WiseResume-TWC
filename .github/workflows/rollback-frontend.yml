name: Rollback Frontend

# One-click rollback: downloads a previously verified build artifact and
# re-deploys it to the live site without rebuilding from source.
#
# HOW TO USE
# ----------
# 1. Go to Actions → "Rollback Frontend" → "Run workflow"
# 2. Paste the run number from the deploy run you want to roll back TO
#    (find it in Actions → "Deploy to Hostinger" — it's the number on the
#    left, e.g. "42"). Leave empty to use the most recent successful deploy.
# 3. Click "Run workflow". The rollback completes in ~2 minutes (no rebuild).
#
# ARTIFACT AVAILABILITY
# ---------------------
# Artifacts are tagged with the deploy run number and retained for 90 days.
# Runs older than 90 days will not have an artifact — for those, use the
# commit-SHA field to trigger a source rebuild instead (slower but always works).

on:
  workflow_dispatch:
    inputs:
      run_number:
        description: >
          ⏪ ROLLBACK FRONTEND — Re-deploys a previously verified build to the
          live site. Enter the run number of the "Deploy to Hostinger" workflow
          run you want to restore (e.g. "42"). Find it in Actions → Deploy to
          Hostinger → the number on the left of each run row. Leave empty to
          use the most recent successful deploy run.
        type: string
        required: false
        default: ''
      commit_sha:
        description: >
          (Fallback) If the artifact for that run is no longer available
          (older than 90 days), you can paste a commit SHA instead and the
          workflow will rebuild + redeploy from source. Leave empty when
          using run_number above.
        type: string
        required: false
        default: ''

permissions:
  actions: read
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history required: the source-rebuild fallback can target any
          # historical commit (e.g. a SHA from a run older than 90 days whose
          # artifact has expired). Shallow clones would make that checkout fail.
          fetch-depth: 0

      - name: Resolve rollback target
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          INPUT_RUN_NUMBER: ${{ inputs.run_number }}
          INPUT_COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          if [ -n "${INPUT_RUN_NUMBER}" ]; then
            echo "Resolving artifact for deploy run number: ${INPUT_RUN_NUMBER}"

            # Look up the run ID that matches the provided run number.
            # NOTE: per_page=100 covers the last 100 deploy runs. If the target
            # run is older than that, the lookup will return nothing — in that
            # case use the commit_sha fallback input instead (source rebuild).
            RUN_DATA=$(gh api "/repos/${REPO}/actions/workflows/deploy.yml/runs?per_page=100" \
              --jq ".workflow_runs[] | select(.run_number == (${INPUT_RUN_NUMBER} | tonumber)) | {id: .id, sha: .head_sha, conclusion: .conclusion}" \
              2>/dev/null | head -1)

            if [ -z "${RUN_DATA}" ]; then
              echo "::error::No deploy run found with run number ${INPUT_RUN_NUMBER} in the last 100 runs. If this run is older, use the commit_sha input for a source rebuild instead."
              exit 1
            fi

            RUN_ID=$(echo "${RUN_DATA}" | jq -r '.id')
            RUN_SHA=$(echo "${RUN_DATA}" | jq -r '.sha')
            RUN_CONCLUSION=$(echo "${RUN_DATA}" | jq -r '.conclusion')

            echo "Found run ${INPUT_RUN_NUMBER} (ID: ${RUN_ID}) — commit ${RUN_SHA:0:7}, conclusion: ${RUN_CONCLUSION}"

            # Only roll back to a run that actually succeeded.
            # A failed run's artifact may be absent or may represent a broken build.
            if [ "${RUN_CONCLUSION}" != "success" ]; then
              echo "::error::Deploy run ${INPUT_RUN_NUMBER} did not conclude with 'success' (got: '${RUN_CONCLUSION}'). Specify a run number whose conclusion is 'success' to ensure you're rolling back to a known-good build."
              exit 1
            fi

            ARTIFACT_NAME="frontend-v${INPUT_RUN_NUMBER}-${RUN_SHA}"
            echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
            echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT
            echo "rollback_sha=${RUN_SHA}" >> $GITHUB_OUTPUT
            echo "use_artifact=true" >> $GITHUB_OUTPUT

          elif [ -n "${INPUT_COMMIT_SHA}" ]; then
            echo "No run number provided — will rebuild from commit SHA: ${INPUT_COMMIT_SHA:0:7}"
            echo "rollback_sha=${INPUT_COMMIT_SHA}" >> $GITHUB_OUTPUT
            echo "use_artifact=false" >> $GITHUB_OUTPUT

          else
            # Neither input given — find the most recent successful deploy run
            echo "No input given — looking up the most recent successful Deploy to Hostinger run..."
            RUN_DATA=$(gh api "/repos/${REPO}/actions/workflows/deploy.yml/runs?status=success&per_page=5" \
              --jq '.workflow_runs[0] | {id: .id, run_number: .run_number, sha: .head_sha}' 2>/dev/null)

            if [ -z "${RUN_DATA}" ]; then
              echo "::error::Could not find any successful Deploy to Hostinger run. Provide a run_number or commit_sha."
              exit 1
            fi

            RUN_ID=$(echo "${RUN_DATA}" | jq -r '.id')
            RUN_NUMBER=$(echo "${RUN_DATA}" | jq -r '.run_number')
            RUN_SHA=$(echo "${RUN_DATA}" | jq -r '.sha')

            echo "Most recent successful deploy: run ${RUN_NUMBER} (ID: ${RUN_ID}), commit ${RUN_SHA:0:7}"
            ARTIFACT_NAME="frontend-v${RUN_NUMBER}-${RUN_SHA}"
            echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
            echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT
            echo "rollback_sha=${RUN_SHA}" >> $GITHUB_OUTPUT
            echo "use_artifact=true" >> $GITHUB_OUTPUT
          fi

      # ── PATH A: artifact-based rollback (fast, no rebuild) ──────────────

      - name: Download verified build artifact
        id: download
        if: steps.resolve.outputs.use_artifact == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.resolve.outputs.artifact_name }}
          run-id: ${{ steps.resolve.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: dist/

      - name: Stamp artifact with rollback metadata
        if: steps.resolve.outputs.use_artifact == 'true' && steps.download.outcome == 'success'
        env:
          ROLLBACK_SHA: ${{ steps.resolve.outputs.rollback_sha }}
        run: |
          echo "{
            \"commit\": \"${ROLLBACK_SHA}\",
            \"shortCommit\": \"${ROLLBACK_SHA:0:7}\",
            \"deployedAt\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\",
            \"deployedBy\": \"${{ github.actor }} (ROLLBACK via artifact)\"
          }" > dist/version.json
          echo "✅ version.json updated for rollback (artifact path)"

      # ── PATH B: source-rebuild fallback (when artifact is expired/missing) ──

      - name: Checkout rollback commit (source rebuild)
        if: steps.resolve.outputs.use_artifact == 'false' || steps.download.outcome != 'success'
        env:
          ROLLBACK_SHA: ${{ steps.resolve.outputs.rollback_sha }}
        run: |
          git checkout "${ROLLBACK_SHA}"
          echo "✅ Checked out commit ${ROLLBACK_SHA:0:7} for source rebuild"

      - name: Setup Node.js (source rebuild)
        if: steps.resolve.outputs.use_artifact == 'false' || steps.download.outcome != 'success'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (source rebuild)
        if: steps.resolve.outputs.use_artifact == 'false' || steps.download.outcome != 'success'
        run: npm ci

      - name: Build previous version (source rebuild)
        if: steps.resolve.outputs.use_artifact == 'false' || steps.download.outcome != 'success'
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_KINDE_CLIENT_ID: ${{ secrets.VITE_KINDE_CLIENT_ID }}
          VITE_KINDE_DOMAIN: ${{ secrets.VITE_KINDE_DOMAIN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_RELEASE: ${{ steps.resolve.outputs.rollback_sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          BUILD_COMMIT: ${{ steps.resolve.outputs.rollback_sha }}

      - name: Stamp build with rollback metadata (source rebuild)
        if: steps.resolve.outputs.use_artifact == 'false' || steps.download.outcome != 'success'
        env:
          ROLLBACK_SHA: ${{ steps.resolve.outputs.rollback_sha }}
        run: |
          echo "{
            \"commit\": \"${ROLLBACK_SHA}\",
            \"shortCommit\": \"${ROLLBACK_SHA:0:7}\",
            \"deployedAt\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\",
            \"deployedBy\": \"${{ github.actor }} (ROLLBACK via source rebuild)\"
          }" > dist/version.json
          echo "✅ version.json updated for rollback (source rebuild path)"

      # ── SHARED: deploy dist/ to Hostinger via FTPS ───────────────────────

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Pre-flight connectivity probe
        run: |
          FTP_HOST="82.29.154.120"
          runner_ip=$(curl -s --connect-timeout 5 --max-time 5 https://api.ipify.org 2>/dev/null || echo "unknown")
          echo "Runner IP: ${runner_ip}"

          probe_tcp() {
            local port="$1"
            for try in 1 2; do
              if timeout 5 bash -c "exec 3<>/dev/tcp/${FTP_HOST}/${port}" 2>/dev/null; then
                return 0
              fi
              [ "$try" = "1" ] && sleep 2
            done
            return 1
          }

          echo "Probing ${FTP_HOST}:21..."
          if probe_tcp 21; then echo "✅ Port 21: TCP open"; PORT21="open"
          else echo "❌ Port 21: TCP closed"; PORT21="closed"; fi

          echo "Probing ${FTP_HOST}:990..."
          if probe_tcp 990; then echo "✅ Port 990: TCP open"; PORT990="open"
          else echo "❌ Port 990: TCP closed"; PORT990="closed"; fi

          if [ "${PORT21}" = "closed" ] && [ "${PORT990}" = "closed" ]; then
            echo "::error::Both FTP ports unreachable. Try re-running to get a different runner IP."
            exit 1
          fi

      - name: Deploy rollback build to Hostinger via FTPS
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        timeout-minutes: 15
        run: |
          set -uo pipefail
          FTP_HOST="82.29.154.120"
          FTP_USER="u966279061.thewise.cloud"
          MIRROR_CMD="mirror --reverse --delete --verbose --parallel=6 ./dist/ /public_html/resume/; bye"
          COMMON_SETTINGS="set ftp:ssl-protect-data true; \
                  set ssl:verify-certificate no; \
                  set ftp:passive-mode true; \
                  set cmd:fail-exit yes; \
                  set net:timeout 15; \
                  set net:max-retries 3; \
                  set net:reconnect-interval-base 10; \
                  set net:reconnect-interval-multiplier 1.5; \
                  set net:persist-retries 3;"

          deploy_explicit() {
            lftp -d -u "${FTP_USER},${FTP_PASSWORD}" "ftp://${FTP_HOST}:21" \
              -e "set ftp:ssl-force true; ${COMMON_SETTINGS} ${MIRROR_CMD}" 2>&1 | tail -300
          }
          deploy_implicit() {
            lftp -d -u "${FTP_USER},${FTP_PASSWORD}" "ftps://${FTP_HOST}:990" \
              -e "${COMMON_SETTINGS} ${MIRROR_CMD}" 2>&1 | tail -300
          }

          try_transport() {
            local label="$1"; local fn="$2"
            for attempt in 1 2 3; do
              echo "::group::${label} attempt ${attempt}/3"
              if "${fn}"; then
                echo "::endgroup::"
                echo "✅ ${label} succeeded on attempt ${attempt}."
                return 0
              fi
              echo "::endgroup::"
              if [ "$attempt" -lt 3 ]; then
                wait_sec=$((attempt * 30))
                echo "${label} attempt ${attempt} failed. Sleeping ${wait_sec}s..."
                sleep "$wait_sec"
              fi
            done
            return 1
          }

          echo "--- Transport 1: Explicit FTPS (port 21) ---"
          if try_transport "Explicit FTPS :21" deploy_explicit; then exit 0; fi

          echo "--- Trying Transport 2: Implicit FTPS (port 990) ---"
          if try_transport "Implicit FTPS :990" deploy_implicit; then exit 0; fi

          echo "::error::FTPS upload failed on both transports after 3 attempts each."
          exit 1

      - name: Verify rollback is live
        run: |
          set -e
          for attempt in $(seq 1 18); do
            echo "Verification attempt $attempt/18..."
            if node scripts/verify-live-deploy.mjs; then
              echo "✅ Rollback verified — live site is serving the rolled-back version."
              exit 0
            fi
            sleep 20
          done
          echo "::error::Rollback verification failed after 18 attempts. The site may still be propagating — wait a minute and check manually."
          exit 1
