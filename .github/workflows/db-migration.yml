name: Run Database Migration

# ⚠️  KNOWN ISSUE: This workflow may fail with "duplicate key value violates unique constraint
# on schema_migrations_pkey" if any migrations were previously applied directly to the
# production database (e.g. via the Supabase dashboard or management API) rather than
# through this CLI workflow. This leaves the local migration history out of sync with what
# the Supabase CLI expects.
#
# ALTERNATIVE: Use the "Apply SQL via Management API" workflow (apply-rpc-migration.yml)
# to apply individual SQL files (DDL, functions, RPC) directly via the management API.
# That workflow does not use the Supabase CLI and does not depend on SUPABASE_DB_PASSWORD.
#
# REQUIRED GitHub Secrets:
#   SUPABASE_ACCESS_TOKEN  — Supabase personal access token
#   SUPABASE_DB_PASSWORD   — Supabase database password

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🗄️ DATABASE MIGRATION — Applies any pending database schema changes
          (new tables, columns, indexes) to the live Supabase database. Only
          run this when you have new migration files to apply. This action
          modifies the production database — double-check your migration
          files before running. Requires SUPABASE_ACCESS_TOKEN and
          SUPABASE_DB_PASSWORD secrets to be set. Takes about 1 minute.
          Leave this field as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, apply database migrations'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply database migrations
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
