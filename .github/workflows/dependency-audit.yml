name: Check: Dependency Security Audit

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🔒 DEPENDENCY AUDIT — Scans all npm packages your project depends
          on and checks if any have known security vulnerabilities. It
          produces a report showing the severity (low / medium / high /
          critical) of any issues found. It does not change or fix anything —
          just reports problems so you can decide what to update. Takes about
          30 seconds. Leave this field as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, run the security audit'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=moderate
