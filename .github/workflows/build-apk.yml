name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Replace Android icons with app icons
        run: |
          # Copy PWA icons to Android resource folders
          cp public/icons/icon-48x48.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp public/icons/icon-48x48.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp public/icons/icon-48x48.png android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png
          cp public/icons/icon-72x72.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp public/icons/icon-72x72.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp public/icons/icon-72x72.png android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png
          cp public/icons/icon-96x96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp public/icons/icon-96x96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp public/icons/icon-96x96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png
          cp public/icons/icon-144x144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp public/icons/icon-144x144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp public/icons/icon-144x144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png
          cp public/icons/icon-192x192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp public/icons/icon-192x192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          cp public/icons/icon-192x192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wiseresume-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
