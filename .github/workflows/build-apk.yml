name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://hjnnamwgztlhzkeuufln.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhqbm5hbXdnenRsaHprZXV1ZmxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzNTE4MTcsImV4cCI6MjA4NTkyNzgxN30.cupd_dz6KHSJaBnUPQzJmQcYc38RTDVIMU5RP25xCso
          VITE_SUPABASE_PROJECT_ID: hjnnamwgztlhzkeuufln

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inject deep link intent filters
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Intent filter for https://localhost/auth/callback
          INTENT_FILTER='
                  <intent-filter android:autoVerify="true">
                      <action android:name="android.intent.action.VIEW" />
                      <category android:name="android.intent.category.DEFAULT" />
                      <category android:name="android.intent.category.BROWSABLE" />
                      <data android:scheme="https" android:host="localhost" android:pathPrefix="/auth/callback" />
                  </intent-filter>
                  <intent-filter>
                      <action android:name="android.intent.action.VIEW" />
                      <category android:name="android.intent.category.DEFAULT" />
                      <category android:name="android.intent.category.BROWSABLE" />
                      <data android:scheme="com.wiseresume.app" android:host="auth" android:pathPrefix="/callback" />
                  </intent-filter>'
          # Inject before closing </activity> tag
          sed -i "/<\/activity>/i\\${INTENT_FILTER}" "$MANIFEST"
          echo "✅ Intent filters injected"

      - name: Inject custom icons
        run: |
          RES_DIR="android/app/src/main/res"
          for size in 48 72 96 144 192 512; do
            case $size in
              48)  folder="mipmap-mdpi" ;;
              72)  folder="mipmap-hdpi" ;;
              96)  folder="mipmap-xhdpi" ;;
              144) folder="mipmap-xxhdpi" ;;
              192) folder="mipmap-xxxhdpi" ;;
              512) folder="mipmap-xxxhdpi" ;;
            esac
            if [ -f "public/icons/icon-${size}x${size}.png" ]; then
              mkdir -p "$RES_DIR/$folder"
              cp "public/icons/icon-${size}x${size}.png" "$RES_DIR/$folder/ic_launcher.png"
              cp "public/icons/icon-${size}x${size}.png" "$RES_DIR/$folder/ic_launcher_round.png"
            fi
          done
          # Copy maskable icons
          if [ -f "public/icons/maskable-icon-192x192.png" ]; then
            cp "public/icons/maskable-icon-192x192.png" "$RES_DIR/mipmap-xxxhdpi/ic_launcher_foreground.png"
          fi

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wiseresume-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
