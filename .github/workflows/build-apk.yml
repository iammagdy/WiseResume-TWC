name: Build Signed Release APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://hjnnamwgztlhzkeuufln.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhqbm5hbXdnenRsaHprZXV1ZmxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzNTE4MTcsImV4cCI6MjA4NTkyNzgxN30.cupd_dz6KHSJaBnUPQzJmQcYc38RTDVIMU5RP25xCso

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inject custom icons
        run: |
          RES_DIR="android/app/src/main/res"
          for size in 48 72 96 144 192 512; do
            case $size in
              48)  folder="mipmap-mdpi" ;;
              72)  folder="mipmap-hdpi" ;;
              96)  folder="mipmap-xhdpi" ;;
              144) folder="mipmap-xxhdpi" ;;
              192) folder="mipmap-xxxhdpi" ;;
              512) folder="mipmap-xxxhdpi" ;;
            esac
            if [ -f "public/icons/icon-${size}x${size}.png" ]; then
              mkdir -p "$RES_DIR/$folder"
              cp "public/icons/icon-${size}x${size}.png" "$RES_DIR/$folder/ic_launcher.png"
              cp "public/icons/icon-${size}x${size}.png" "$RES_DIR/$folder/ic_launcher_round.png"
            fi
          done
          if [ -f "public/icons/maskable-icon-192x192.png" ]; then
            cp "public/icons/maskable-icon-192x192.png" "$RES_DIR/mipmap-xxxhdpi/ic_launcher_foreground.png"
          fi

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/wiseresume-release.keystore

      - name: Inject signing config into build.gradle
        run: |
          GRADLE_FILE="android/app/build.gradle"
          # Insert signingConfigs block before buildTypes
          sed -i '/buildTypes {/i \
              signingConfigs {\
                  release {\
                      storeFile file("wiseresume-release.keystore")\
                      storePassword System.getenv("KEYSTORE_PASSWORD")\
                      keyAlias System.getenv("KEY_ALIAS")\
                      keyPassword System.getenv("KEY_PASSWORD")\
                  }\
              }' "$GRADLE_FILE"
          # Add signingConfig to release buildType
          sed -i '/buildTypes {/,/}/{
            /release {/a \
                signingConfig signingConfigs.release
          }' "$GRADLE_FILE"

      - name: Build Signed Release APK
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: wiseresume-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
