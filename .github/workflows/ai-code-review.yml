name: AI Code Review (GitHub Models)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🔍 AI CODE REVIEW — Uses GitHub Models (free with GitHub Pro) to
          review recent code changes and suggest improvements, potential bugs,
          and security issues. Uses AI from GitHub's model API — no tokens
          from your vibe coding platform. Instead of asking an AI assistant
          to review your code, this does it automatically. Takes about 1-2
          minutes. Leave this field as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, review code'

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Get recent code changes
        id: changes
        run: |
          DIFF=$(git diff HEAD~5 HEAD -- src/ | head -200)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Request AI code review
        id: review
        run: |
          DIFF='${{ steps.changes.outputs.diff }}'

          RESPONSE=$(curl -s -X POST \
            "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @- << 'EOF'
          {
            "model": "gpt-4o",
            "messages": [
              {
                "role": "system",
                "content": "You are an expert code reviewer. Review the code changes and provide constructive feedback on: 1) potential bugs, 2) security issues, 3) performance concerns, 4) code style/best practices. Be concise and actionable."
              },
              {
                "role": "user",
                "content": "Please review these recent code changes:\n\n$DIFF"
              }
            ],
            "temperature": 0.7,
            "max_tokens": 800
          }
          EOF
          )

          REVIEW=$(echo "$RESPONSE" | python3 -c "import sys,json; data=json.load(sys.stdin); print(data['choices'][0]['message']['content'])" 2>/dev/null || echo "AI review generation failed")

          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Display AI code review
        run: |
          echo "============================================"
          echo "           AI CODE REVIEW RESULTS"
          echo "============================================"
          echo ""
          echo "${{ steps.review.outputs.review }}"
          echo ""
          echo "============================================"

      - name: Save review as artifact
        run: |
          mkdir -p review-artifacts
          cat > review-artifacts/CODE_REVIEW.md << 'EOF'
          # AI Code Review

          ${{ steps.review.outputs.review }}

          ---
          *Generated by AI Code Review via GitHub Models*
          EOF

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-review-${{ github.run_number }}
          path: review-artifacts/CODE_REVIEW.md
          retention-days: 30
