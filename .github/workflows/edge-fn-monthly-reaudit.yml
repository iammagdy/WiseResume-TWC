name: Edge Functions Monthly Re-Audit

# Phase 4 (Task #68) monthly snapshot. Runs the full Task #61 probe-set
# (CORS preflight + no-auth + auth-with-test-JWT + anon-only) across every
# deployed edge function on the first of every month and commits a
# human-readable G/Y/R verdict report under
# reports/edge-fn-drift-<YYYY-MM-DD>.md, plus a sibling
# .edge-fn-drift-<YYYY-MM-DD>.json snapshot. The report includes a diff vs
# the most recent prior snapshot (verdict transitions + added/removed
# slugs).
#
# This is the recurring re-audit surface. For per-push parity enforcement
# (inventory / config / auth-posture / callers / freshness) use the
# blocking `Check Edge Functions Are Deployed` workflow.
#
# Failures here DO NOT fail the workflow — the report (with its YELLOW/RED
# rows) is the deliverable.

on:
  schedule:
    - cron: '7 5 1 * *'   # 05:07 UTC on the 1st of every month
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reaudit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # the freshness check needs the full git log

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run monthly re-audit driver
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        # Allow non-zero exit (drift findings) — the report is what we want
        # to capture; the existing per-push workflow handles blocking.
        run: node scripts/edge-fn-monthly-reaudit.mjs || true

      - name: Commit monthly snapshot
        run: |
          today=$(date -u +%Y-%m-%d)
          report="reports/edge-fn-drift-${today}.md"
          json="reports/.edge-fn-drift-${today}.json"
          if [ ! -f "$report" ]; then
            echo "Re-audit driver did not produce $report — nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add "$report"
          [ -f "$json" ] && git add "$json"
          if git diff --staged --quiet; then
            echo "No changes — snapshot already up to date."
            exit 0
          fi
          git commit -m "chore(edge-fn): monthly drift re-audit snapshot ${today} (Task #68)"
          git push
