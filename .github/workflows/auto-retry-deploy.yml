name: Auto-retry failed deploy

# Why this exists:
# GitHub-hosted runners cycle through a shared pool of Azure datacenter
# IPs. Hostinger's perimeter firewall occasionally blocks specific
# Azure IPs (especially for FTP traffic), causing Deploy to Hostinger
# to fail with TCP-unreachable errors. The block is per-IP, so simply
# re-running the failed jobs gets us a different runner with a
# different IP — and almost always succeeds.
#
# This workflow listens for "Deploy to Hostinger" failure events and
# automatically re-runs the failed jobs up to 3 total attempts. With
# ~30% per-IP block rate, three independent attempts give a >97%
# success probability per deploy without any human intervention.

on:
  workflow_run:
    workflows: ["Deploy to Hostinger"]
    types: [completed]

permissions:
  actions: write
  contents: read

jobs:
  retry:
    # Only retry when:
    #   - the previous run failed (success / cancelled / skipped → no-op)
    #   - we haven't already burned 3 attempts on this run
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: Re-run failed jobs on a fresh runner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
        run: |
          NEXT=$((ATTEMPT + 1))
          echo "Deploy run ${RUN_ID} failed on attempt ${ATTEMPT}/3."
          echo "Re-queuing failed jobs — GitHub will assign a brand-new runner with a different Azure IP (attempt ${NEXT}/3)."

          # Brief pause so the runner pool can rotate. Without this we
          # sometimes land on the exact same blocked IP again.
          sleep 30

          gh api -X POST "/repos/${REPO}/actions/runs/${RUN_ID}/rerun-failed-jobs"

          echo "✅ Re-run requested. Watch:"
          echo "    https://github.com/${REPO}/actions/runs/${RUN_ID}"

      - name: Final-attempt notice
        if: github.event.workflow_run.run_attempt == 2
        run: |
          echo "::warning::This is the final auto-retry (attempt 3/3). If it fails too, the IP block may be persistent — investigate Hostinger firewall logs or contact Hostinger support."
