name: Refresh DevKit GitHub Token in Supabase

# Syncs GITHUB_TOKEN, GITHUB_OWNER, and GITHUB_REPO into Supabase edge function
# secrets so the DevKit deployment tab (admin-github-status) can fetch commits.
# Runs using the Supabase management API — no Supabase CLI or DB password needed.
#
# REQUIRED GitHub Secrets:
#   SUPABASE_ACCESS_TOKEN  — Supabase personal access token (management API)
#   SUPABASE_PROJECT_REF   — Supabase project ref (jnsfmkzgxsviuthaqlyy)
#   GITHUB_PAT             — GitHub personal access token with repo read scope
#                            (MUST be named GITHUB_PAT, not GITHUB_TOKEN — that
#                            name is reserved by GitHub Actions)
#
# Run this workflow whenever the GitHub PAT is rotated or the DevKit deployment
# tab stops showing commits.

on:
  workflow_dispatch:
    inputs:
      github_owner:
        description: "GitHub owner/org username (default: iammagdy)"
        type: string
        required: false
        default: 'iammagdy'
      github_repo:
        description: "GitHub repo name (default: wiseresume-74945019)"
        type: string
        required: false
        default: 'wiseresume-74945019'

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          MISSING=0
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && echo "::error::Missing SUPABASE_ACCESS_TOKEN secret" && MISSING=1
          [ -z "$SUPABASE_PROJECT_REF" ]  && echo "::error::Missing SUPABASE_PROJECT_REF secret" && MISSING=1
          [ -z "$GITHUB_PAT_VALUE" ]      && echo "::error::Missing GITHUB_PAT secret — add it to repo Settings → Secrets → Actions" && MISSING=1
          [ "$MISSING" -eq 1 ] && exit 1
          echo "✅ All required secrets are configured."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          GITHUB_PAT_VALUE: ${{ secrets.GITHUB_PAT }}

      - name: Push GitHub secrets to Supabase edge functions
        run: |
          OWNER="${{ github.event.inputs.github_owner }}"
          REPO="${{ github.event.inputs.github_repo }}"

          echo "Pushing GITHUB_TOKEN, GITHUB_OWNER ($OWNER), GITHUB_REPO ($REPO) to Supabase..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/secrets" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "[
              {\"name\": \"GITHUB_TOKEN\", \"value\": \"$GITHUB_PAT_VALUE\"},
              {\"name\": \"GITHUB_OWNER\", \"value\": \"$OWNER\"},
              {\"name\": \"GITHUB_REPO\",  \"value\": \"$REPO\"}
            ]")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "::error::Failed to push secrets (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
          echo "✅ Secrets pushed successfully."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          GITHUB_PAT_VALUE: ${{ secrets.GITHUB_PAT }}

      - name: Verify secrets are set in Supabase
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/secrets" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Could not list Supabase secrets (HTTP $HTTP_CODE)"
            exit 1
          fi

          MISSING=0
          for KEY in GITHUB_TOKEN GITHUB_OWNER GITHUB_REPO; do
            if echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); names=[s['name'] for s in d]; exit(0 if '$KEY' in names else 1)" 2>/dev/null; then
              echo "✅ $KEY is set in Supabase"
            else
              echo "::error::$KEY is NOT present in Supabase secrets after push"
              MISSING=1
            fi
          done
          [ "$MISSING" -eq 1 ] && exit 1
          echo "✅ All GitHub DevKit secrets verified in Supabase."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Verify GitHub token works for repo commits API
        run: |
          OWNER="${{ github.event.inputs.github_owner }}"
          REPO="${{ github.event.inputs.github_repo }}"
          STATUS=$(curl -s -o /tmp/commits.json -w "%{http_code}" \
            "https://api.github.com/repos/$OWNER/$REPO/commits?per_page=1" \
            -H "Authorization: Bearer $GITHUB_PAT_VALUE" \
            -H "Accept: application/vnd.github+json" \
            -H "User-Agent: WiseResume-DevKit/1.0")
          echo "GitHub API status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::GitHub token cannot access $OWNER/$REPO commits (HTTP $STATUS)"
            cat /tmp/commits.json
            exit 1
          fi
          echo "✅ GitHub token verified — can read commits from $OWNER/$REPO"
        env:
          GITHUB_PAT_VALUE: ${{ secrets.GITHUB_PAT }}
