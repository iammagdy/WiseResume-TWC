name: Check Outdated Packages

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          📦 CHECK OUTDATED PACKAGES — Lists all npm packages that have newer
          versions available. Does not install or change anything — it just
          shows you what is behind so you can decide what to update. Green
          means up to date, yellow means a minor update is available, red
          means a major update is available. Takes about 30 seconds. Leave
          this field as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, check for outdated packages'

jobs:
  outdated:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for outdated packages
        run: |
          echo "=== Outdated packages ==="
          npm outdated || true
          echo ""
          echo "ℹ️  'Current' = version you have installed"
          echo "ℹ️  'Wanted'  = latest safe update (won't break things)"
          echo "ℹ️  'Latest'  = newest version available (may have breaking changes)"
