name: TypeScript Type Check

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🔍 TYPE CHECK — Scans the entire codebase for TypeScript type errors
          without doing a full build. Think of it as a spell-checker but for
          code logic — it catches mistakes like passing the wrong data type to
          a function. Faster than a full build. Takes about 1 minute. Leave
          this field as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, run the type check'

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit
