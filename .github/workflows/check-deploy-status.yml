name: Check Deploy Status

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🔎 CHECK DEPLOY STATUS — Checks whether the live website is already
          showing the latest changes or is still catching up. Run this after
          clicking "Deploy Frontend" and you are not sure if your changes are
          live yet. It compares the version on the live site against the latest
          commit in GitHub and tells you clearly: up to date or still deploying.
          Takes a few seconds. Leave this field as-is and click "Run workflow"
          to proceed.
        type: string
        required: false
        default: 'Yes, check the deploy status'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Compare live site version vs latest GitHub commit
        run: |
          LATEST_COMMIT="${{ github.sha }}"
          SHORT_LATEST="${LATEST_COMMIT:0:7}"

          echo "Fetching version info from live site..."
          LIVE_RESPONSE=$(curl -s --max-time 10 "https://thewise.cloud/resume/version.json" || echo '{}')

          LIVE_COMMIT=$(echo "$LIVE_RESPONSE" | jq -r '.commit // "unknown"')
          LIVE_SHORT=$(echo "$LIVE_RESPONSE" | jq -r '.shortCommit // "unknown"')
          LIVE_TIME=$(echo "$LIVE_RESPONSE" | jq -r '.deployedAt // "unknown"')
          LIVE_BY=$(echo "$LIVE_RESPONSE" | jq -r '.deployedBy // "unknown"')

          echo ""
          echo "============================================"
          echo "         DEPLOY STATUS REPORT"
          echo "============================================"
          echo ""
          echo "  Latest commit on GitHub : $SHORT_LATEST"
          echo "  Version on live site    : $LIVE_SHORT"
          echo "  Last deployed at        : $LIVE_TIME"
          echo "  Deployed by             : $LIVE_BY"
          echo ""

          if [ "$LIVE_COMMIT" = "unknown" ]; then
            echo "  ⚠️  Could not read version from live site."
            echo "     This is normal if the site was never deployed"
            echo "     using the new Deploy Frontend action yet."
            echo "     Run 'Deploy Frontend' once to enable this check."
          elif [ "$LATEST_COMMIT" = "$LIVE_COMMIT" ]; then
            echo "  ✅ LIVE SITE IS UP TO DATE"
            echo "     Your latest changes are already on the live website."
          else
            echo "  ⏳ LIVE SITE IS BEHIND"
            echo "     The latest changes have not fully reflected yet."
            echo "     Hostinger can take up to 1 hour to propagate."
            echo "     Check back in a few minutes and run this action again."
          fi

          echo ""
          echo "============================================"
