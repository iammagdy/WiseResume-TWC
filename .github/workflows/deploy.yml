name: Deploy to Hostinger

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🌐 DEPLOY FRONTEND — Builds the WiseResume web app and uploads it
          to the live website (Hostinger). Use this after you make changes to
          the UI, pages, or any frontend code. Takes about 2-3 minutes.
          Leave this field as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, deploy the frontend'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_KINDE_CLIENT_ID: ${{ secrets.VITE_KINDE_CLIENT_ID }}
          VITE_KINDE_DOMAIN: ${{ secrets.VITE_KINDE_DOMAIN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Write version file
        run: |
          echo "{
            \"commit\": \"${{ github.sha }}\",
            \"shortCommit\": \"${GITHUB_SHA:0:7}\",
            \"deployedAt\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\",
            \"deployedBy\": \"${{ github.actor }}\"
          }" > dist/version.json
          echo "✅ version.json written: commit ${GITHUB_SHA:0:7} at $(date -u)"

      - name: Diagnose connectivity
        continue-on-error: true
        run: |
          echo "=== Runner public IP ==="
          curl -s --max-time 5 https://api.ipify.org || echo "(could not fetch)"
          echo ""
          echo "=== Port reachability ==="
          nc -zvw 5 82.29.154.120 21  2>&1 && echo "✅ 21  OPEN" || echo "❌ 21  CLOSED/FILTERED"
          nc -zvw 5 82.29.154.120 22  2>&1 && echo "✅ 22  OPEN" || echo "❌ 22  CLOSED/FILTERED"
          nc -zvw 5 82.29.154.120 990 2>&1 && echo "✅ 990 OPEN" || echo "❌ 990 CLOSED/FILTERED"

      - name: Install transfer tools
        run: sudo apt-get install -y sshpass lftp

      - name: Deploy via rsync over SSH (primary)
        id: rsync
        continue-on-error: true
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sshpass -p "$FTP_PASSWORD" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 -p 22" \
            ./dist/ u966279061.thewise.cloud@82.29.154.120:/public_html/resume/

      - name: Deploy via lftp SFTP (fallback)
        if: steps.rsync.outcome == 'failure'
        id: lftp_sftp
        continue-on-error: true
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -d -u "u966279061.thewise.cloud,$FTP_PASSWORD" sftp://82.29.154.120:22 \
            -e "set sftp:auto-confirm yes; set net:timeout 20; set net:max-retries 2; mirror --reverse --delete --verbose ./dist/ /public_html/resume/; bye" 2>&1 | tail -150

      - name: Deploy via FTPS legacy port 990 (fallback)
        if: steps.rsync.outcome == 'failure' && steps.lftp_sftp.outcome == 'failure'
        id: ftps990
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 82.29.154.120
          username: u966279061.thewise.cloud
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps-legacy
          port: 990
          local-dir: ./dist/
          server-dir: /public_html/resume/
          dangerous-clean-slate: true

      - name: Report result
        if: always()
        run: |
          echo "rsync:      ${{ steps.rsync.outcome }}"
          echo "lftp-sftp:  ${{ steps.lftp_sftp.outcome }}"
          echo "ftps-990:   ${{ steps.ftps990.outcome }}"
          if [ "${{ steps.rsync.outcome }}" != "success" ] && \
             [ "${{ steps.lftp_sftp.outcome }}" != "success" ] && \
             [ "${{ steps.ftps990.outcome }}" != "success" ]; then
            echo "❌ ALL transfer methods failed. Check 'Diagnose connectivity' step above."
            echo "You may need to whitelist GitHub Actions IPs in Hostinger's firewall."
            exit 1
          fi
