name: Deploy to Hostinger

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🌐 DEPLOY FRONTEND — Builds the WiseResume web app and uploads it
          to the live website (Hostinger). Use this after you make changes to
          the UI, pages, or any frontend code. Takes about 2-3 minutes.
          Leave this field as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, deploy the frontend'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_KINDE_CLIENT_ID: ${{ secrets.VITE_KINDE_CLIENT_ID }}
          VITE_KINDE_DOMAIN: ${{ secrets.VITE_KINDE_DOMAIN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Write version file
        run: |
          echo "{
            \"commit\": \"${{ github.sha }}\",
            \"shortCommit\": \"${GITHUB_SHA:0:7}\",
            \"deployedAt\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\",
            \"deployedBy\": \"${{ github.actor }}\"
          }" > dist/version.json
          echo "✅ version.json written: commit ${GITHUB_SHA:0:7} at $(date -u)"

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to Hostinger via SFTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -d -u "u966279061.thewise.cloud,$FTP_PASSWORD" sftp://82.29.154.120:22 \
            -e "set sftp:auto-confirm yes; set net:timeout 20; set net:max-retries 2; mirror --reverse --delete --verbose ./dist/ /public_html/resume/; bye" 2>&1 | tail -200
