name: Deploy to Hostinger

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🌐 DEPLOY FRONTEND — Builds the WiseResume web app and uploads it
          to the live website (Hostinger). Use this after you make changes to
          the UI, pages, or any frontend code. Takes about 2-3 minutes.
          Leave this field as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, deploy the frontend'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Write version file
        run: |
          echo "{
            \"commit\": \"${{ github.sha }}\",
            \"shortCommit\": \"${GITHUB_SHA:0:7}\",
            \"deployedAt\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\",
            \"deployedBy\": \"${{ github.actor }}\"
          }" > dist/version.json
          echo "✅ version.json written: commit ${GITHUB_SHA:0:7} at $(date -u)"

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 82.29.154.120
          username: u966279061.thewise.cloud
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/resume/
          dangerous-clean-slate: true
