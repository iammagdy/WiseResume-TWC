name: Deploy to Hostinger

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🌐 DEPLOY FRONTEND — Builds the WiseResume web app and uploads it
          to the live website (Hostinger). Use this after you make changes to
          the UI, pages, or any frontend code. Takes about 2-3 minutes.
          Leave this field as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, deploy the frontend'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_KINDE_CLIENT_ID: ${{ secrets.VITE_KINDE_CLIENT_ID }}
          VITE_KINDE_DOMAIN: ${{ secrets.VITE_KINDE_DOMAIN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          # Baked into the bundle via vite.config.ts `define`. Used by the
          # landing-page version footer so it always shows the deployed
          # commit even if /version.json fails to load.
          BUILD_COMMIT: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.repository.updated_at }}

      - name: Write version file
        run: |
          echo "{
            \"commit\": \"${{ github.sha }}\",
            \"shortCommit\": \"${GITHUB_SHA:0:7}\",
            \"deployedAt\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\",
            \"deployedBy\": \"${{ github.actor }}\"
          }" > dist/version.json
          echo "✅ version.json written: commit ${GITHUB_SHA:0:7} at $(date -u)"

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Pre-flight connectivity probe
        # Fast TCP-level reachability check on both FTP ports before
        # burning 14+ minutes on lftp. If both ports fail to even open
        # a TCP connection, the runner's Azure IP has been blocked by
        # Hostinger's perimeter firewall — fail fast so the auto-retry
        # workflow (auto-retry-deploy.yml) can re-run on a fresh runner
        # with a different IP.
        #
        # WHY bash /dev/tcp INSTEAD OF curl ftp://:
        # `curl ftp://host` performs a full FTP login (anonymous USER),
        # which Hostinger refuses — that gave false negatives even on
        # runs where the deploy ultimately succeeded. A bare TCP SYN
        # via /dev/tcp tells us only one thing: did the firewall let
        # the connection through? That is exactly the signal we need.
        # We probe twice per port with a short sleep to absorb
        # one-off network blips.
        #
        # NOTE: We use the FTP server's IP address (82.29.154.120) directly
        # rather than the website hostname (thewise.cloud). The hostname
        # resolves via Hostinger's authoritative DNS to a *rotating pool*
        # of web-frontend IPs (Cloudflare/CDN edges) that do NOT run an
        # FTP daemon — every connection times out. The same IP is used by
        # rollback-frontend.yml and is the only address known to actually
        # accept FTP traffic.
        run: |
          FTP_HOST="82.29.154.120"
          runner_ip=$(curl -s --connect-timeout 5 --max-time 5 https://api.ipify.org 2>/dev/null || echo "unknown")
          echo "Runner IP: ${runner_ip}"

          probe_tcp() {
            local port="$1"
            for try in 1 2; do
              if timeout 5 bash -c "exec 3<>/dev/tcp/${FTP_HOST}/${port}" 2>/dev/null; then
                return 0
              fi
              [ "$try" = "1" ] && sleep 2
            done
            return 1
          }

          echo "Probing ${FTP_HOST}:21 (explicit FTPS, TCP-only)..."
          if probe_tcp 21; then
            echo "✅ Port 21: TCP open"
            PORT21="open"
          else
            echo "❌ Port 21: TCP connection refused or timed out"
            PORT21="closed"
          fi

          echo "Probing ${FTP_HOST}:990 (implicit FTPS, TCP-only)..."
          if probe_tcp 990; then
            echo "✅ Port 990: TCP open"
            PORT990="open"
          else
            echo "❌ Port 990: TCP connection refused or timed out"
            PORT990="closed"
          fi

          if [ "${PORT21}" = "closed" ] && [ "${PORT990}" = "closed" ]; then
            echo "::error::Both FTP ports are TCP-unreachable from runner IP ${runner_ip}. Hostinger's perimeter firewall has blocked this Azure runner IP. Failing fast so auto-retry-deploy.yml can re-run on a fresh runner (different IP). No time wasted on lftp retries — they would all time out the same way."
            exit 1
          fi

      - name: Deploy to Hostinger via FTPS
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        timeout-minutes: 15
        run: |
          set -uo pipefail
          # WHY FTPS INSTEAD OF SFTP:
          # On 2026-04-21 the SFTP transport (port 22) became unusable
          # from GitHub Actions runner IPs. Run 24747728477 failed with
          # "Timeout - reconnecting / max-retries exceeded" during the
          # SFTP INIT handshake even though TCP connect succeeded. A
          # follow-up retry-loop deploy (run 24748098362) hung for 30+
          # minutes — Hostinger's sshd was completely silent toward
          # the runner IP. Independent probes from a separate network
          # showed sshd on :22 not even returning a banner, while
          # vsftpd on :21 cleanly responded with "220 FTP Server ready."
          # Hostinger applies aggressive per-IP rate limiting on sshd
          # but NOT on the FTP daemon, and Azure-hosted runner IPs are
          # a shared pool, so SFTP is fundamentally unreliable for
          # this deploy. FTPS over port 21 with explicit TLS uses the
          # completely separate vsftpd / pure-ftpd daemon with its own
          # blocklist (effectively never triggered by CI traffic) and
          # gives us the same credential, the same encryption-in-flight
          # guarantee, and the same lftp tooling.
          #
          # WHY HARDCODED IP INSTEAD OF HOSTNAME:
          # `thewise.cloud` resolves to a rotating pool of Hostinger
          # web-frontend / CDN IPs (e.g. 195.35.60.x, 191.96.144.x,
          # 191.101.104.x, 212.1.212.x) that do NOT run an FTP daemon.
          # Every attempt against the hostname times out at the TCP
          # connect stage. 82.29.154.120 is the actual FTP server IP
          # (`220 FTP Server ready.`) and is the same address used by
          # rollback-frontend.yml. Using the hostname caused 100% deploy
          # failure across runs 24866204895, 24867338086, 24868950054,
          # and 24869377124, each timing out at ~14 minutes.
          #
          # WHY PORT 990 FALLBACK:
          # Port 990 is a completely separate implicit FTPS code path on
          # Hostinger's infrastructure. IP-level blocks applied to port
          # 21 traffic do not carry over to port 990, so it provides a
          # genuine alternative transport when port 21 is inaccessible.
          #
          # WHY THE OUTER RETRY LOOP:
          # Even FTPS can hit transient network blips on the runner.
          # The previous SFTP run that succeeded took 1m42s, so a 15
          # minute step timeout plus 3 retries with widening backoff
          # (30s / 60s / 90s) absorbs any realistic transient failure
          # without ever burning a 6-hour-default-timeout slot.
          #
          # WHY cmd:fail-exit yes:
          # Without it, lftp's `mirror` reports success even when
          # individual file uploads fail — that's the failure mode
          # that caused the stale-v3.4 incident (Task #29).
          # `mirror --reverse --delete` already includes dotfiles like
          # .htaccess by default; the authoritative pass/fail gate
          # for "did v3.5 actually go live" is the next step
          # (verify-live-deploy.mjs), which probes the live URL.
          FTP_HOST="82.29.154.120"
          FTP_USER="u966279061.thewise.cloud"
          MIRROR_CMD="mirror --reverse --delete --verbose --parallel=6 ./dist/ /public_html/resume/; bye"
          COMMON_SETTINGS="set ftp:ssl-protect-data true; \
                  set ssl:verify-certificate no; \
                  set ftp:passive-mode true; \
                  set cmd:fail-exit yes; \
                  set net:timeout 15; \
                  set net:max-retries 3; \
                  set net:reconnect-interval-base 10; \
                  set net:reconnect-interval-multiplier 1.5; \
                  set net:persist-retries 3;"

          # Explicit FTPS on port 21 (connect in plain-text, STARTTLS upgrade)
          deploy_explicit() {
            lftp -d -u "${FTP_USER},${FTP_PASSWORD}" "ftp://${FTP_HOST}:21" \
              -e "set ftp:ssl-force true; \
                  ${COMMON_SETTINGS} \
                  ${MIRROR_CMD}" 2>&1 | tail -300
          }
          # Implicit FTPS on port 990 (TLS from first byte — separate daemon path)
          deploy_implicit() {
            lftp -d -u "${FTP_USER},${FTP_PASSWORD}" "ftps://${FTP_HOST}:990" \
              -e "${COMMON_SETTINGS} \
                  ${MIRROR_CMD}" 2>&1 | tail -300
          }

          try_transport() {
            local label="$1"
            local fn="$2"
            for attempt in 1 2 3; do
              echo "::group::${label} attempt ${attempt}/3"
              if "${fn}"; then
                echo "::endgroup::"
                echo "✅ ${label} succeeded on attempt ${attempt}."
                return 0
              fi
              echo "::endgroup::"
              if [ "$attempt" -lt 3 ]; then
                wait_sec=$((attempt * 30))
                echo "${label} attempt ${attempt} failed. Sleeping ${wait_sec}s before retry..."
                sleep "$wait_sec"
              fi
            done
            return 1
          }

          echo "--- Transport 1: Explicit FTPS (port 21) ---"
          if try_transport "Explicit FTPS :21" deploy_explicit; then
            exit 0
          fi

          echo "--- Transport 1 exhausted. Trying Transport 2: Implicit FTPS (port 990) ---"
          if try_transport "Implicit FTPS :990" deploy_implicit; then
            exit 0
          fi

          runner_ip=$(curl -s --max-time 5 https://api.ipify.org 2>/dev/null || echo "the runner IP")
          echo "::error::FTPS upload failed on both port 21 (explicit) and port 990 (implicit) after 3 attempts each. Runner IP: ${runner_ip}. Run URL: ${GITHUB_SERVER_URL:-https://github.com}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}. Contact Hostinger support with these details if the issue persists."
          exit 1

      - name: Verify live site reflects the new build
        # Polls https://resume.thewise.cloud and asserts changelog.json
        # version matches package.json, plus the no-cache + Task #26
        # security headers are live. Uses `node` directly so it works
        # even if `npm ci` cached an old node_modules. Retries for up
        # to ~60s to allow Hostinger's edge / origin to settle.
        run: |
          set -e
          for attempt in 1 2 3 4 5 6; do
            echo "Verification attempt $attempt..."
            if node scripts/verify-live-deploy.mjs; then
              echo "✅ Live site verified."
              exit 0
            fi
            sleep 10
          done
          echo "::error::Live site verification failed after 6 attempts (~60s). The upload may have completed but the live site is not serving the new build. See logs above."
          exit 1
