name: Check AI Key is Valid

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🤖 CHECK AI KEY — Calls the Vertex AI Express API directly using your
          VERTEX_API_KEY (or WISE_AI_API_KEY) and tells you if it is working,
          expired, or has run out of quota. Run this when AI features stop
          working and you need to confirm the API key itself is valid.
          Requires VERTEX_API_KEY or WISE_AI_API_KEY to be set as a GitHub
          secret. Leave this field as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, check the AI key'

jobs:
  check-ai-key:
    runs-on: ubuntu-latest
    steps:
      - name: Test AI key against Vertex AI Express API
        run: |
          echo "============================================"
          echo "          AI KEY HEALTH CHECK"
          echo "============================================"
          echo ""

          # Accept either VERTEX_API_KEY (preferred) or WISE_AI_API_KEY (legacy)
          AI_KEY="${VERTEX_API_KEY:-$WISE_AI_API_KEY}"

          if [ -z "$AI_KEY" ]; then
            echo "  ❌ No AI key is set in GitHub secrets."
            echo "     You need either VERTEX_API_KEY or WISE_AI_API_KEY."
            echo ""
            echo "  How to fix:"
            echo "  1. Get a key at: https://aistudio.google.com/app/apikey"
            echo "  2. Add it as VERTEX_API_KEY in:"
            echo "     GitHub repo → Settings → Secrets and variables → Actions"
            echo "  3. Run the 'Set Supabase Edge Function Secrets' workflow to"
            echo "     push it to Supabase so edge functions can use it."
            exit 1
          fi

          KEY_NAME="WISE_AI_API_KEY"
          [ -n "$VERTEX_API_KEY" ] && KEY_NAME="VERTEX_API_KEY"
          echo "  ✅ $KEY_NAME is set in GitHub secrets."
          echo "  Testing against Vertex AI Express API (aiplatform.googleapis.com)..."
          echo ""

          test_endpoint() {
            local label="$1"
            local url="$2"
            local result
            result=$(curl -s -w "\n%{http_code}" -X POST "$url" \
              -H "Content-Type: application/json" \
              -d '{"contents":[{"parts":[{"text":"Hi"}]}],"generationConfig":{"maxOutputTokens":1}}')
            local http_code body
            http_code=$(echo "$result" | tail -1)
            body=$(echo "$result" | head -n -1)
            echo "  [$label] HTTP $http_code"
            if [ "$http_code" != "200" ]; then
              echo "  Response: $body" | head -c 300
              echo ""
            fi
            echo "$http_code" >&3
          }

          exec 3>/tmp/statuses

          # Test 1: Vertex AI Express
          echo "  Testing Vertex AI Express (aiplatform.googleapis.com)..."
          test_endpoint "Vertex AI Express" \
            "https://aiplatform.googleapis.com/v1/publishers/google/models/gemini-2.5-flash:generateContent?key=${AI_KEY}"

          # Test 2: Generative Language API with gemini-2.0-flash (broadly available)
          echo "  Testing Generative Language API (generativelanguage.googleapis.com)..."
          test_endpoint "Generative Language" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${AI_KEY}"

          exec 3>&-
          STATUS1=$(sed -n '1p' /tmp/statuses)
          STATUS2=$(sed -n '2p' /tmp/statuses)
          echo ""
          echo "  Results: Vertex=$STATUS1  GenLang=$STATUS2"
          echo ""

          if [ "$STATUS1" = "200" ] || [ "$STATUS2" = "200" ]; then
            echo "  ✅ KEY IS VALID"
            [ "$STATUS1" = "200" ] && echo "     Works on: Vertex AI Express (aiplatform.googleapis.com)"
            [ "$STATUS2" = "200" ] && echo "     Works on: Generative Language API (generativelanguage.googleapis.com)"
            echo ""
            echo "  The app automatically tries both endpoints in order."
            echo "  AI features should be working in WiseResume."
          elif [ "$STATUS1" = "429" ] || [ "$STATUS2" = "429" ]; then
            echo "  ⚠️  QUOTA EXCEEDED — Key is valid but hit rate limit. Wait a few minutes."
          elif [ "$STATUS1" = "403" ] || [ "$STATUS2" = "403" ]; then
            echo "  ❌ API NOT ENABLED (HTTP 403) — The API is disabled on your Google Cloud project."
            echo ""
            echo "  To fix:"
            echo "  1. Go to: https://console.cloud.google.com/apis/library"
            echo "  2. Enable: 'Generative Language API' (search for it)"
            echo "  3. Also enable: 'Vertex AI API' if you want Vertex AI Express"
            exit 1
          else
            echo "  ❌ KEY NOT WORKING (Vertex: $STATUS1, GenLang: $STATUS2)"
            echo ""
            echo "  Possible causes & fixes:"
            echo ""
            echo "  1. API not enabled — Go to Cloud Console → APIs & Services → Library"
            echo "     and enable 'Generative Language API'"
            echo ""
            echo "  2. API key has API restrictions — Go to Cloud Console → APIs & Services → Credentials"
            echo "     click your key → under 'API restrictions' select 'Don't restrict key'"
            echo ""
            echo "  3. Billing not enabled — Go to Cloud Console → Billing"
            echo "     and link a billing account to your project"
            echo ""
            echo "  4. Key is for a different project — Make sure you copied the right key"
            exit 1
          fi

          echo ""
          echo "============================================"
        env:
          VERTEX_API_KEY: ${{ secrets.VERTEX_API_KEY }}
          WISE_AI_API_KEY: ${{ secrets.WISE_AI_API_KEY }}
