name: Check AI Key is Valid

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🤖 CHECK AI KEY — Tests your WISE_AI_API_KEY against both Google AI
          endpoints (Vertex AI Express and Generative Language API) and tells
          you which ones work. Run this when AI features stop working and you
          need to confirm the API key is valid. Leave this field as-is and
          click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, check the AI key'

jobs:
  check-ai-key:
    runs-on: ubuntu-latest
    steps:
      - name: Test AI key against Google AI endpoints
        run: |
          echo "============================================"
          echo "          AI KEY HEALTH CHECK"
          echo "============================================"
          echo ""

          # Accept either VERTEX_API_KEY or WISE_AI_API_KEY
          AI_KEY="${VERTEX_API_KEY:-$WISE_AI_API_KEY}"

          if [ -z "$AI_KEY" ]; then
            echo "  ❌ No AI key is set in GitHub secrets."
            echo "     Add WISE_AI_API_KEY in:"
            echo "     GitHub repo → Settings → Secrets and variables → Actions"
            exit 1
          fi

          KEY_NAME="WISE_AI_API_KEY"
          [ -n "$VERTEX_API_KEY" ] && KEY_NAME="VERTEX_API_KEY"
          echo "  ✅ $KEY_NAME is set in GitHub secrets."
          echo ""

          # ---- Test 1: Vertex AI Express (v1beta1 + x-goog-api-key header) ----
          echo "  Test 1: Vertex AI Express (aiplatform.googleapis.com v1beta1)"
          RESP1=$(curl -s -w "\n%{http_code}" -X POST \
            "https://aiplatform.googleapis.com/v1beta1/publishers/google/models/gemini-2.0-flash:generateContent" \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: ${AI_KEY}" \
            -d '{"contents":[{"parts":[{"text":"Hi"}]}],"generationConfig":{"maxOutputTokens":1}}')
          STATUS1=$(echo "$RESP1" | tail -1)
          BODY1=$(echo "$RESP1" | head -n -1 | head -c 250)
          echo "  HTTP $STATUS1"
          [ "$STATUS1" != "200" ] && echo "  Response: $BODY1" && echo ""

          # ---- Test 2: Generative Language API (v1beta + ?key= query param) ----
          echo "  Test 2: Generative Language API (generativelanguage.googleapis.com)"
          RESP2=$(curl -s -w "\n%{http_code}" -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${AI_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"contents":[{"parts":[{"text":"Hi"}]}],"generationConfig":{"maxOutputTokens":1}}')
          STATUS2=$(echo "$RESP2" | tail -1)
          BODY2=$(echo "$RESP2" | head -n -1 | head -c 250)
          echo "  HTTP $STATUS2"
          [ "$STATUS2" != "200" ] && echo "  Response: $BODY2" && echo ""

          echo ""
          echo "  Results: Vertex AI Express=$STATUS1  Generative Language=$STATUS2"
          echo ""

          if [ "$STATUS1" = "200" ] || [ "$STATUS2" = "200" ]; then
            echo "  ✅ KEY IS WORKING"
            [ "$STATUS1" = "200" ] && echo "     ✓ Vertex AI Express (v1beta1 + x-goog-api-key header)"
            [ "$STATUS2" = "200" ] && echo "     ✓ Generative Language API (?key= param)"
            echo ""
            echo "  The app tries both endpoints automatically."
            echo "  AI features should be working in WiseResume."

          elif [ "$STATUS1" = "429" ] || [ "$STATUS2" = "429" ]; then
            echo "  ⚠️  QUOTA EXCEEDED — Key is valid but hit its rate limit."
            echo "     Wait a few minutes and try again."

          else
            echo "  ❌ KEY NOT WORKING"
            echo ""
            echo "  Vertex AI Express HTTP $STATUS1 — $(echo "$BODY1" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error',{}).get('message','unknown error')[:120])" 2>/dev/null || echo 'see above')"
            echo "  Generative Language HTTP $STATUS2 — $(echo "$BODY2" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error',{}).get('message','unknown error')[:120])" 2>/dev/null || echo 'see above')"
            echo ""
            echo "  How to fix:"
            echo ""
            echo "  Option A — Enable APIs in Google Cloud Console:"
            echo "    1. Go to https://console.cloud.google.com/apis/library"
            echo "    2. Search for and enable 'Vertex AI API'"
            echo "    3. Also enable 'Generative Language API'"
            echo "    4. Check your API key has no API restrictions:"
            echo "       Cloud Console → APIs & Services → Credentials → your key"
            echo "       → API restrictions → 'Don't restrict key'"
            echo ""
            echo "  Option B — Use a key from Google AI Studio instead:"
            echo "    1. Go to https://aistudio.google.com/app/apikey"
            echo "    2. Create a key and update WISE_AI_API_KEY in GitHub Secrets"
            echo "    3. Run 'Set Supabase Edge Function Secrets' workflow"
            exit 1
          fi

          echo ""
          echo "============================================"
        env:
          VERTEX_API_KEY: ${{ secrets.VERTEX_API_KEY }}
          WISE_AI_API_KEY: ${{ secrets.WISE_AI_API_KEY }}
