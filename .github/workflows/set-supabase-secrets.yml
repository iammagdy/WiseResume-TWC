name: Set Supabase Edge Function Secrets

# Run this manually whenever you need to push secrets to Supabase edge functions.
#
# REQUIRED GitHub Secrets:
#   SUPABASE_ACCESS_TOKEN      — Your Supabase personal access token
#   OPENROUTER_API_KEY         — OpenRouter API key (for WiseResume AI / Gemma 4 free)
#   GROQ_API_KEY               — Groq API key (for WiseResume AI / Llama 3.3 free)
#
# OPTIONAL GitHub Secrets (set these to enable extra features):
#   KINDE_DOMAIN or VITE_KINDE_DOMAIN — Kinde auth domain (e.g. https://yourapp.kinde.com)
#   API_KEY_ENCRYPTION_SECRET  — Random string to encrypt user BYOK keys (enables BYOK)
#   GITHUB_PAT                 — GitHub personal access token (enables DevKit deployment panel)
#                                NOTE: Must be named GITHUB_PAT (not GITHUB_TOKEN — that name
#                                is reserved by GitHub Actions and cannot be used as a repo secret)
#   GITHUB_OWNER               — GitHub repo owner/org username (enables DevKit deployment panel)
#   GITHUB_REPO                — GitHub repo name (enables DevKit deployment panel)
#   WISE_AI_API_KEY / VERTEX_API_KEY  — Legacy keys (no longer required)
#
# QUICK FIX (no GitHub PAT needed):
#   You can also refresh edge function secrets directly via the Supabase management API
#   using the SUPABASE_ACCESS_TOKEN without running this workflow at all:
#
#   curl -s -X POST "https://api.supabase.com/v1/projects/jnsfmkzgxsviuthaqlyy/secrets" \
#     -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
#     -H "Content-Type: application/json" \
#     -d '[{"name":"GITHUB_TOKEN","value":"<pat>"},{"name":"GITHUB_OWNER","value":"iammagdy"},{"name":"GITHUB_REPO","value":"wiseresume-74945019"}]'

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm you want to push secrets to Supabase"
        required: true
        default: ''

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets are set
        run: |
          MISSING=0
          [ -z "$OPENROUTER_API_KEY" ] && echo "::error::Missing OPENROUTER_API_KEY" && MISSING=1
          [ -z "$GROQ_API_KEY" ]       && echo "::error::Missing GROQ_API_KEY" && MISSING=1
          [ "$MISSING" -eq 1 ] && echo "Add missing secrets in Settings → Secrets and variables → Actions" && exit 1
          echo "✅ OPENROUTER_API_KEY is set."
          echo "✅ GROQ_API_KEY is set."
          [ -n "$KINDE_DOMAIN" ]               && echo "✅ KINDE_DOMAIN is set." || \
          ( [ -n "$VITE_KINDE_DOMAIN" ]        && echo "✅ VITE_KINDE_DOMAIN will be used as KINDE_DOMAIN." ) || \
            echo "⚠️  KINDE_DOMAIN not set — token-exchange may not verify Kinde JWTs."
          [ -n "$API_KEY_ENCRYPTION_SECRET" ]  && echo "✅ API_KEY_ENCRYPTION_SECRET is set." || \
            echo "⚠️  API_KEY_ENCRYPTION_SECRET not set — user BYOK key storage disabled."
          [ -n "$GITHUB_TOKEN_SECRET" ]        && echo "✅ GITHUB_PAT is set — DevKit deployment panel will be enabled." || \
            echo "⚠️  GITHUB_PAT not set — DevKit deployment panel GITHUB_TOKEN will not be updated by this workflow."
          [ -n "$GITHUB_OWNER" ]               && echo "✅ GITHUB_OWNER is set." || \
            echo "⚠️  GITHUB_OWNER not set — DevKit deployment panel will not work."
          [ -n "$GITHUB_REPO_NAME" ]           && echo "✅ GITHUB_REPO is set." || \
            echo "⚠️  GITHUB_REPO not set — DevKit deployment panel will not work."
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          KINDE_DOMAIN: ${{ secrets.KINDE_DOMAIN }}
          VITE_KINDE_DOMAIN: ${{ secrets.VITE_KINDE_DOMAIN }}
          API_KEY_ENCRYPTION_SECRET: ${{ secrets.API_KEY_ENCRYPTION_SECRET }}
          GITHUB_TOKEN_SECRET: ${{ secrets.GITHUB_PAT }}
          GITHUB_OWNER: ${{ secrets.GITHUB_OWNER }}
          GITHUB_REPO_NAME: ${{ secrets.GITHUB_REPO }}

      - name: Push secrets to Supabase
        run: |
          echo "Pushing secrets to Supabase project jnsfmkzgxsviuthaqlyy..."

          # WiseResume AI — OpenRouter (Gemma 4 free)
          supabase secrets set OPENROUTER_API_KEY="$OPENROUTER_API_KEY" \
            --project-ref jnsfmkzgxsviuthaqlyy
          echo "✅ OPENROUTER_API_KEY pushed."

          # WiseResume AI — Groq (Llama 3.3 free)
          supabase secrets set GROQ_API_KEY="$GROQ_API_KEY" \
            --project-ref jnsfmkzgxsviuthaqlyy
          echo "✅ GROQ_API_KEY pushed."

          # Kinde domain — accept either name, prefer the non-VITE_ version
          KINDE_DOMAIN_VALUE="${KINDE_DOMAIN:-$VITE_KINDE_DOMAIN}"
          if [ -n "$KINDE_DOMAIN_VALUE" ]; then
            supabase secrets set KINDE_DOMAIN="$KINDE_DOMAIN_VALUE" \
              --project-ref jnsfmkzgxsviuthaqlyy
            echo "✅ KINDE_DOMAIN pushed."
          else
            echo "⚠️  Skipping KINDE_DOMAIN — not set."
          fi

          # BYOK encryption secret
          if [ -n "$API_KEY_ENCRYPTION_SECRET" ]; then
            supabase secrets set API_KEY_ENCRYPTION_SECRET="$API_KEY_ENCRYPTION_SECRET" \
              --project-ref jnsfmkzgxsviuthaqlyy
            echo "✅ API_KEY_ENCRYPTION_SECRET pushed."
          else
            echo "⚠️  Skipping API_KEY_ENCRYPTION_SECRET — not set."
          fi

          # GitHub secrets — needed by DevKit deployment panel (admin-env-check, admin-github-status)
          # Note: use GITHUB_PAT in GitHub repo secrets to avoid conflict with the built-in GITHUB_TOKEN.
          # If GITHUB_PAT is not set, skip — use the management API curl command documented above instead.
          if [ -n "$GITHUB_TOKEN_SECRET" ]; then
            supabase secrets set GITHUB_TOKEN="$GITHUB_TOKEN_SECRET" \
              --project-ref jnsfmkzgxsviuthaqlyy
            echo "✅ GITHUB_TOKEN pushed."
          else
            echo "⚠️  Skipping GITHUB_TOKEN — GITHUB_PAT not configured in GitHub repo secrets."
            echo "    To update manually, run the management API curl command from the workflow header comments."
          fi

          if [ -n "$GITHUB_OWNER" ]; then
            supabase secrets set GITHUB_OWNER="$GITHUB_OWNER" \
              --project-ref jnsfmkzgxsviuthaqlyy
            echo "✅ GITHUB_OWNER pushed."
          else
            echo "⚠️  Skipping GITHUB_OWNER — not set."
          fi

          if [ -n "$GITHUB_REPO_NAME" ]; then
            supabase secrets set GITHUB_REPO="$GITHUB_REPO_NAME" \
              --project-ref jnsfmkzgxsviuthaqlyy
            echo "✅ GITHUB_REPO pushed."
          else
            echo "⚠️  Skipping GITHUB_REPO — not set."
          fi

          # Legacy keys (kept for backward compat, no longer the primary provider)
          AI_KEY_VALUE="${WISE_AI_API_KEY:-$VERTEX_API_KEY}"
          if [ -n "$AI_KEY_VALUE" ]; then
            supabase secrets set WISE_AI_API_KEY="$AI_KEY_VALUE" --project-ref jnsfmkzgxsviuthaqlyy
            supabase secrets set VERTEX_API_KEY="$AI_KEY_VALUE" --project-ref jnsfmkzgxsviuthaqlyy
            echo "✅ Legacy WISE_AI_API_KEY + VERTEX_API_KEY pushed."
          fi

          # Optional extra CORS origin
          if [ -n "$ALLOWED_ORIGIN" ]; then
            supabase secrets set ALLOWED_ORIGIN="$ALLOWED_ORIGIN" \
              --project-ref jnsfmkzgxsviuthaqlyy
            echo "✅ ALLOWED_ORIGIN pushed."
          fi

          echo ""
          echo "Done! Listing all Supabase secrets (names only):"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          KINDE_DOMAIN: ${{ secrets.KINDE_DOMAIN }}
          VITE_KINDE_DOMAIN: ${{ secrets.VITE_KINDE_DOMAIN }}
          API_KEY_ENCRYPTION_SECRET: ${{ secrets.API_KEY_ENCRYPTION_SECRET }}
          GITHUB_TOKEN_SECRET: ${{ secrets.GITHUB_PAT }}
          GITHUB_OWNER: ${{ secrets.GITHUB_OWNER }}
          GITHUB_REPO_NAME: ${{ secrets.GITHUB_REPO }}
          WISE_AI_API_KEY: ${{ secrets.WISE_AI_API_KEY }}
          VERTEX_API_KEY: ${{ secrets.VERTEX_API_KEY }}
          ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}

      - name: Verify secrets are set
        run: |
          supabase secrets list --project-ref jnsfmkzgxsviuthaqlyy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
