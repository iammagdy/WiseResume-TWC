name: Set Supabase Edge Function Secrets

# Run this manually whenever you need to configure or rotate the secrets
# that your Supabase edge functions depend on.
#
# REQUIRED GitHub Secrets (add them in Settings → Secrets → Actions):
#   SUPABASE_ACCESS_TOKEN   — Your Supabase personal access token
#   VERTEX_API_KEY          — Google Gemini/Vertex AI API key (for WiseResume AI)
#   API_KEY_ENCRYPTION_SECRET — Random string used to encrypt/decrypt user BYOK keys
#   KINDE_DOMAIN            — Your Kinde domain, e.g. https://yourapp.kinde.com
#
# OPTIONAL GitHub Secrets:
#   ALLOWED_ORIGIN          — Extra CORS origin to allow (e.g. a staging domain)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm you want to push secrets to Supabase"
        required: true
        default: ''

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets are set
        run: |
          MISSING=""
          [ -z "$VERTEX_API_KEY" ] && MISSING="$MISSING VERTEX_API_KEY"
          [ -z "$API_KEY_ENCRYPTION_SECRET" ] && MISSING="$MISSING API_KEY_ENCRYPTION_SECRET"
          [ -z "$KINDE_DOMAIN" ] && MISSING="$MISSING KINDE_DOMAIN"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required GitHub Secrets:$MISSING"
            echo "Add them in Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All required secrets are present."
        env:
          VERTEX_API_KEY: ${{ secrets.VERTEX_API_KEY }}
          API_KEY_ENCRYPTION_SECRET: ${{ secrets.API_KEY_ENCRYPTION_SECRET }}
          KINDE_DOMAIN: ${{ secrets.KINDE_DOMAIN }}

      - name: Push secrets to Supabase
        run: |
          # Core AI secret — required for WiseResume AI (Gemini/Vertex)
          supabase secrets set VERTEX_API_KEY="$VERTEX_API_KEY" \
            --project-ref jnsfmkzgxsviuthaqlyy

          # Encryption secret — required for user BYOK key storage/retrieval
          supabase secrets set API_KEY_ENCRYPTION_SECRET="$API_KEY_ENCRYPTION_SECRET" \
            --project-ref jnsfmkzgxsviuthaqlyy

          # Kinde domain — required for token-exchange JWT verification
          supabase secrets set KINDE_DOMAIN="$KINDE_DOMAIN" \
            --project-ref jnsfmkzgxsviuthaqlyy

          # Optional: extra CORS origin
          if [ -n "$ALLOWED_ORIGIN" ]; then
            supabase secrets set ALLOWED_ORIGIN="$ALLOWED_ORIGIN" \
              --project-ref jnsfmkzgxsviuthaqlyy
          fi

          echo "Secrets pushed successfully."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VERTEX_API_KEY: ${{ secrets.VERTEX_API_KEY }}
          API_KEY_ENCRYPTION_SECRET: ${{ secrets.API_KEY_ENCRYPTION_SECRET }}
          KINDE_DOMAIN: ${{ secrets.KINDE_DOMAIN }}
          ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}

      - name: Verify secrets are set
        run: |
          echo "Listing Supabase secrets (names only, values are hidden):"
          supabase secrets list --project-ref jnsfmkzgxsviuthaqlyy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
