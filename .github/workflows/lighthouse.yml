name: Lighthouse Performance Check

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🔦 LIGHTHOUSE PERFORMANCE CHECK — Runs Google Lighthouse against
          your live website and scores it from 0 to 100 on Performance,
          Accessibility, Best Practices, and SEO. A score above 90 is great.
          Use this after big UI changes or deployments to make sure the site
          is still fast and accessible. A full report is saved as a
          downloadable artifact. Takes about 1-2 minutes. Leave this field
          as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, run the Lighthouse check'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://thewise.cloud/resume/
          uploadArtifacts: true
          temporaryPublicStorage: true
