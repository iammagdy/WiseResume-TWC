name: 🚀 Final Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          VITE_APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          BUILD_COMMIT: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.repository.updated_at }}

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Surgical Deploy (Root Strike)
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -d -u "u966279061.thewise.cloud,${FTP_PASSWORD}" "ftp://82.29.154.120:21" -e "
            set ftp:ssl-force true; 
            set ssl:verify-certificate no; 
            # 1. Clean old mess
            rm -rf public_html/resume;
            mkdir -p public_html;
            # 2. Deploy to direct public_html root
            mirror --reverse --delete --verbose --parallel=10 ./dist/ /public_html/;
            bye
          "
