name: 🚀 Deploy Frontend

# ⚠️  AUTO-TRIGGER DISABLED — Vercel handles frontend deployment now.
# Re-enable by adding the push trigger below when switching back from Vercel.
# Optimized: large assets only sync when public/tesseract or public/pdfjs changed.
on:
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          VITE_APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          BUILD_COMMIT: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.repository.updated_at }}

      - name: Check bundle size
        run: |
          TOTAL_SIZE=$(find dist/assets -name "*.js" -not -name "*.map" | xargs wc -c 2>/dev/null | tail -1 | awk '{print $1}')
          echo "Total JS (all chunks): $TOTAL_SIZE bytes"
          ENTRY_SIZE=$(find dist/assets -name "index-*.js" -not -name "*.map" | xargs wc -c 2>/dev/null | tail -1 | awk '{print $1}')
          echo "Entry chunk size: $ENTRY_SIZE bytes"
          if [ "$ENTRY_SIZE" -gt 3145728 ]; then
            echo "❌ Entry bundle exceeds 3MB limit: $ENTRY_SIZE bytes"
            exit 1
          fi
          echo "✅ Entry bundle within limit"

      - name: Check if large assets changed
        id: large_assets
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^public/tesseract\|^public/pdfjs'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Sync large static assets (only when tesseract/pdfjs changed)
        if: steps.large_assets.outputs.changed == 'true'
        timeout-minutes: 30
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "u966279061.thewise.cloud,${FTP_PASSWORD}" "ftp://82.29.154.120:21" \
            -e "set ftp:ssl-force true; \
                set ssl:verify-certificate no; \
                set ftp:passive-mode true; \
                set net:timeout 120; \
                set net:max-retries 5; \
                set net:reconnect-interval-base 5; \
                set ftp:use-mdtm true; \
                set ftp:use-site-chmod false; \
                mirror --reverse --verbose --parallel=8 --only-newer ./dist/tesseract/ resume/tesseract/; \
                mirror --reverse --verbose --parallel=8 --only-newer ./dist/pdfjs/    resume/pdfjs/; \
                bye"

      - name: Sync app bundle (JS / CSS / HTML)
        timeout-minutes: 10
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "u966279061.thewise.cloud,${FTP_PASSWORD}" "ftp://82.29.154.120:21" \
            -e "set ftp:ssl-force true; \
                set ssl:verify-certificate no; \
                set ftp:passive-mode true; \
                set net:timeout 60; \
                set net:max-retries 5; \
                set net:reconnect-interval-base 5; \
                set ftp:use-site-chmod false; \
                mirror --reverse --delete --verbose --parallel=8 \
                  --exclude tesseract/ --exclude pdfjs/ \
                  ./dist/ resume/; \
                bye"
