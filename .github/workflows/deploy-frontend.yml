name: 🚀 Deploy Frontend

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          VITE_APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_DEV_KIT_PASSWORD: ${{ secrets.VITE_DEV_KIT_PASSWORD }}
          BUILD_COMMIT: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.repository.updated_at }}

      - name: Verify build output
        run: |
          echo "=== index.html bundle reference ==="
          grep -o 'src="/assets/index-[^"]*"' dist/index.html || echo "No index bundle found"
          echo "=== dist/index.html size (bytes) ==="
          wc -c dist/index.html

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Probe FTP connection (non-fatal)
        continue-on-error: true
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "--- Trying FTPS (explicit TLS) ---"
          lftp -u "u966279061.thewise.cloud,${FTP_PASSWORD}" "ftp://82.29.154.120:21" \
            -e "set ftp:ssl-force true; set ssl:verify-certificate no; set net:timeout 10; set net:max-retries 1; pwd; bye" \
            2>&1 && echo "✅ FTPS works" || echo "⚠️ FTPS failed"
          echo "--- Trying plain FTP ---"
          lftp -u "u966279061.thewise.cloud,${FTP_PASSWORD}" "ftp://82.29.154.120:21" \
            -e "set ftp:ssl-allow false; set net:timeout 10; set net:max-retries 1; pwd; bye" \
            2>&1 && echo "✅ Plain FTP works" || echo "⚠️ Plain FTP failed"
          echo "--- Trying FTPS passive mode ---"
          lftp -u "u966279061.thewise.cloud,${FTP_PASSWORD}" "ftp://82.29.154.120:21" \
            -e "set ftp:ssl-force true; set ssl:verify-certificate no; set ftp:passive-mode true; set net:timeout 10; set net:max-retries 1; pwd; bye" \
            2>&1 && echo "✅ FTPS passive works" || echo "⚠️ FTPS passive failed"

      - name: Sync to Hostinger
        timeout-minutes: 20
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "u966279061.thewise.cloud,${FTP_PASSWORD}" "ftp://82.29.154.120:21" \
            -e "set ftp:ssl-force true; \
                set ssl:verify-certificate no; \
                set ftp:passive-mode true; \
                set net:timeout 60; \
                set net:max-retries 5; \
                set net:reconnect-interval-base 10; \
                rm -f index.html; \
                mirror --reverse --delete --verbose --parallel=3 ./dist/ .; \
                mirror --reverse --delete --verbose --parallel=3 ./dist/ resume/; \
                bye"
