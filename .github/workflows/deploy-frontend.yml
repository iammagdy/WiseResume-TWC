name: 🚀 Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          VITE_APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_DEV_KIT_PASSWORD: ${{ secrets.VITE_DEV_KIT_PASSWORD }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          BUILD_COMMIT: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.repository.updated_at }}

      - name: Verify build output
        run: |
          echo "=== index.html bundle reference ==="
          grep -o 'src="/assets/index-[^"]*"' dist/index.html || echo "No index bundle found"
          echo "=== dist/index.html size (bytes) ==="
          wc -c dist/index.html
          echo "=== large asset directories ==="
          du -sh dist/tesseract dist/pdfjs 2>/dev/null || true

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Sync large static assets (Tesseract / pdf.js — only-newer)
        timeout-minutes: 30
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Tesseract WASM cores + OCR lang data + pdf.js fonts/cmaps are large
          # binary files that rarely change. Upload only when newer than what is
          # already on the server so subsequent deploys skip them entirely.
          lftp -u "u966279061.thewise.cloud,${FTP_PASSWORD}" "ftp://82.29.154.120:21" \
            -e "set ftp:ssl-force true; \
                set ssl:verify-certificate no; \
                set ftp:passive-mode true; \
                set net:timeout 120; \
                set net:max-retries 5; \
                set net:reconnect-interval-base 5; \
                set ftp:use-mdtm true; \
                mirror --reverse --verbose --parallel=8 --only-newer ./dist/tesseract/ resume/tesseract/; \
                mirror --reverse --verbose --parallel=8 --only-newer ./dist/pdfjs/    resume/pdfjs/; \
                bye"

      - name: Sync app bundle (JS / CSS / HTML — with delete)
        timeout-minutes: 10
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Sync everything except the large binary dirs (already handled above).
          # --delete removes stale chunks from previous builds.
          lftp -u "u966279061.thewise.cloud,${FTP_PASSWORD}" "ftp://82.29.154.120:21" \
            -e "set ftp:ssl-force true; \
                set ssl:verify-certificate no; \
                set ftp:passive-mode true; \
                set net:timeout 60; \
                set net:max-retries 5; \
                set net:reconnect-interval-base 5; \
                mirror --reverse --delete --verbose --parallel=8 \
                  --exclude tesseract/ --exclude pdfjs/ \
                  ./dist/ resume/; \
                bye"
