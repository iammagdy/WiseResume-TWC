name: Atlas Sync Check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  atlas-sync:
    name: Verify Project Atlas matches the codebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Atlas sync check
        run: npx -y tsx scripts/atlas-sync-check.ts
