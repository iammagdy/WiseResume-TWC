name: Auto-Format Code (Prettier)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          ✨ AUTO-FORMAT CODE — Runs Prettier to automatically format all code
          files (JS, TS, TSX, JSON, CSS, etc.) to consistent style, then
          commits the changes. Instead of asking AI to fix formatting, this
          does it automatically. Takes about 1 minute. Leave this field as-is
          and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, format code'

jobs:
  auto-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier
        run: |
          echo "Running Prettier to format code..."
          npx prettier --write src/ --ignore-unknown || true
          echo "✅ Code formatting applied."

      - name: Commit formatting changes if any
        run: |
          if git diff --quiet; then
            echo "ℹ️  Code already properly formatted."
          else
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add src/
            git commit -m "style: auto-format code with Prettier

Formatted by Prettier via GitHub Actions.

Co-Authored-By: GitHub Actions <actions@github.com>"
            git push
            echo "✅ Formatting changes committed and pushed."
          fi
