name: "AI: What's New for Users"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🎉 AI "WHAT'S NEW FOR USERS" — Uses GitHub Models to convert your
          technical commits into a friendly, non-technical summary that
          regular users would understand. Great for composing social media
          posts, newsletter updates, or user-facing changelog. Uses GitHub's
          free AI — no tokens from your platform. Takes about 1 minute. Leave
          this field as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, generate user summary'

jobs:
  whats-new:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 30

      - name: Get recent commits for users
        id: commits
        run: |
          COMMITS=$(git log --oneline -15 --no-decorate)
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate user-friendly summary with AI
        id: summary
        run: |
          COMMITS='${{ steps.commits.outputs.commits }}'

          RESPONSE=$(curl -s -X POST \
            "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @- << 'EOF'
          {
            "model": "gpt-4o",
            "messages": [
              {
                "role": "system",
                "content": "You are a friendly tech writer. Convert technical commit messages into exciting, easy-to-understand updates for regular users who don't know what 'refactor' or 'optimize' means. Be enthusiastic, use simple language, focus on benefits (faster, easier, safer), and organize in bullet points."
              },
              {
                "role": "user",
                "content": "Convert these technical updates into user-friendly language that non-technical people would find exciting:\n\n$COMMITS\n\nMake it sound like good news and highlight the user benefits!"
              }
            ],
            "temperature": 0.8,
            "max_tokens": 600
          }
          EOF
          )

          SUMMARY=$(echo "$RESPONSE" | python3 -c "import sys,json; data=json.load(sys.stdin); print(data['choices'][0]['message']['content'])" 2>/dev/null || echo "Summary generation failed")

          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Display user-friendly summary
        run: |
          echo "============================================"
          echo "          WHAT'S NEW FOR USERS"
          echo "============================================"
          echo ""
          echo "${{ steps.summary.outputs.summary }}"
          echo ""
          echo "============================================"
          echo "💡 Use this for:"
          echo "  - Social media posts"
          echo "  - Newsletter updates"
          echo "  - User-facing changelog"
          echo "  - Release announcements"
          echo "============================================"

      - name: Save summary as artifact
        run: |
          mkdir -p summaries
          cat > summaries/WHATS_NEW.md << 'EOF'
          # What's New for Users

          ${{ steps.summary.outputs.summary }}

          ---
          *Generated by AI "What's New" GitHub Action*
          EOF

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: whats-new-${{ github.run_number }}
          path: summaries/WHATS_NEW.md
          retention-days: 30
