name: Lint Check

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🧹 LINT CHECK — Scans the code for style issues, unused imports,
          and common mistakes using ESLint. It does not change any files —
          it just reports problems. Use this when you want a quick code
          quality check before a release. Takes about 1 minute. Leave this
          field as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, run the lint check'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src --ext .ts,.tsx --max-warnings=0
