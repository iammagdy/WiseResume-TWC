name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy all edge functions
        run: supabase functions deploy --project-ref jnsfmkzgxsviuthaqlyy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Bug #5: enforce verify_jwt=false on functions that need it, regardless
      # of CLI-side drift. The Supabase CLI has historically left the gateway
      # `verify_jwt` flag on for some functions even when supabase/config.toml
      # declares it false — `ai-test` was a confirmed victim (gateway rejected
      # every DevKit call with "Invalid or expired auth token" before reaching
      # function code). This step PATCHes the Management API right after deploy
      # so the gateway state always matches config.toml.
      - name: Enforce verify_jwt=false on DevKit-style public functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in ai-test; do
            echo "PATCH $fn → verify_jwt=false"
            curl -fsS -X PATCH \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"verify_jwt": false}' \
              "https://api.supabase.com/v1/projects/jnsfmkzgxsviuthaqlyy/functions/$fn" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'  → verify_jwt={d.get(\"verify_jwt\")} version={d.get(\"version\")}')"
          done

      - name: Verify every local function is now deployed
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: node scripts/check-edge-functions-deployed.mjs
