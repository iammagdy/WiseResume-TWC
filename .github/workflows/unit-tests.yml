name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🧪 UNIT TESTS — Runs the full Vitest suite including visual-regression
          guards for the PDF export pipeline (page-break overlay exclusion and
          contact-icon alignment). Takes about 30 seconds.
        type: string
        required: false
        default: 'Yes, run unit tests'

jobs:
  test:
    name: Vitest unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test
        env:
          CI: true

      - name: Report results
        if: always()
        run: |
          echo "Unit test run complete."
