name: Unit Tests (disabled)

# This workflow has been disabled per Task #11. It used to run Vitest on every
# push and PR, but the suite is no longer maintained and was failing on every
# commit (run #90 etc.). The triggers are intentionally limited to manual
# `workflow_dispatch` so the file stays in git history without polluting the
# Actions tab on routine pushes.

on:
  workflow_dispatch:

jobs:
  noop:
    name: Disabled
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: echo "Unit Tests workflow is disabled."
