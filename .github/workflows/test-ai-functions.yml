name: Check: AI Features (End-to-End Test)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🤖 TEST ALL AI FUNCTIONS — Calls each AI edge function with a tiny
          test payload and reports pass or fail for each one. Use this after
          deploying edge functions to confirm everything is healthy, or when
          users report that a specific AI feature is broken. Requires
          VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY, and
          SUPABASE_SERVICE_ROLE_KEY secrets. Takes about 1 minute. Leave
          this field as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, test all AI functions'

jobs:
  test-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Test all AI edge functions
        run: |
          BASE_URL="${{ secrets.VITE_SUPABASE_URL }}"
          ANON_KEY="${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}"
          SERVICE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

          echo "============================================"
          echo "        AI FUNCTIONS HEALTH CHECK"
          echo "============================================"
          echo ""

          check_function() {
            local name=$1
            local endpoint=$2
            local payload=$3

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              -X POST "$BASE_URL/functions/v1/$endpoint" \
              -H "apikey: $ANON_KEY" \
              -H "Authorization: Bearer $SERVICE_KEY" \
              -H "Content-Type: application/json" \
              -d "$payload")

            if [ "$STATUS" = "200" ]; then
              echo "  ✅ $name — OK"
            elif [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
              echo "  ✅ $name — Reachable (auth required, as expected)"
            elif [ "$STATUS" = "402" ]; then
              echo "  ✅ $name — Reachable (credits check working)"
            elif [ "$STATUS" = "429" ]; then
              echo "  ⚠️  $name — Rate limited (function is up)"
            elif [ "$STATUS" = "404" ]; then
              echo "  ❌ $name — NOT FOUND (may need redeployment)"
            elif [ "$STATUS" = "500" ] || [ "$STATUS" = "422" ]; then
              echo "  ⚠️  $name — Reachable but returned $STATUS (check AI key)"
            else
              echo "  ❌ $name — Unexpected status $STATUS"
            fi
          }

          check_function "tailor-resume"       "tailor-resume"        '{"resume":{"name":"Test"},"jobDescription":"Test job","intensity":"light"}'
          check_function "agentic-chat"         "agentic-chat"         '{"message":"Hello","conversationHistory":[],"currentResume":null}'
          check_function "enhance-section"      "enhance-section"      '{"section":"summary","action":"improve","currentContent":"Test","context":{}}'
          check_function "generate-cover-letter" "generate-cover-letter" '{"resume":{"name":"Test"},"jobDescription":"Test job","tone":"professional"}'
          check_function "analyze-resume"       "analyze-resume"       '{"resume":{"name":"Test"},"jobDescription":"Test job"}'
          check_function "parse-resume"         "parse-resume"         '{}'
          check_function "ai-health"            "ai-health"            '{}'

          echo ""
          echo "============================================"
          echo "Legend:"
          echo "  ✅ Working normally"
          echo "  ⚠️  Reachable but check logs for details"
          echo "  ❌ Not working — needs attention"
          echo "============================================"
