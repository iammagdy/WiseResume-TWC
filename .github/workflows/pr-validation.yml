name: PR Validation

# Lightweight pull-request validation. Type-checks the project and runs the two
# heavy PortfolioEditor test files that cannot be executed in the local agent
# harness (it backgrounds + kills heavy Vitest runs). This workflow performs NO
# build, NO deployment, and NO Appwrite/Vercel actions — it is verification only.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save Actions minutes.
concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck + editor tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run locally-blocked editor tests
        run: >-
          npx vitest run
          src/pages/__tests__/PortfolioEditorPage.test.tsx
          src/pages/__tests__/PortfolioEditorPage-D8.test.tsx
