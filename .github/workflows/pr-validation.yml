name: PR Validation

# Lightweight pull-request validation for the Portfolio repair PR. Type-checks
# the project and runs the portfolio test files that are known to pass and are
# relevant to this PR. Verification only — NO build, NO deployment, NO
# Appwrite/Vercel actions, and it does not touch any deploy workflow.
#
# NOTE: PortfolioEditorPage.test.tsx + PortfolioEditorPage-D8.test.tsx are now
# RE-ENABLED (audit F9). The previous CI hang was a test-mock defect, not an
# editor bug: the useProfile/useResumes mocks returned a fresh object per render,
# so the page's `useEffect(..., [profile])` (which calls many setState) re-fired
# every render and looped forever. The mocks now return stable references and the
# missing `parseDbJson` export was added. No editor source was changed.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save Actions minutes.
concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck + portfolio tests
    runs-on: ubuntu-latest
    # Short timeout so a future hang fails fast instead of burning ~15 minutes.
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run portfolio tests (relevant, known-passing)
        run: >-
          npx vitest run
          src/hooks/__tests__/usePublicPortfolio.test.tsx
          src/hooks/usePortfolioSEO.test.tsx
          src/pages/__tests__/PublicPortfolioPage.test.tsx
          src/pages/__tests__/PublicPortfolioPage-D8.test.tsx
          src/pages/__tests__/PortfolioPrivate-D8.test.tsx
          src/pages/__tests__/PortfolioUsernameConflict-D8.test.tsx
          src/components/portfolio/editor/__tests__/MoreTab.test.tsx
          src/components/portfolio/editor/__tests__/SetupTab.test.tsx
          src/components/portfolio/public/__tests__/PublicHero.test.tsx
          src/components/portfolio/public/__tests__/PublicSections.test.tsx
          src/components/portfolio/public/cards/__tests__/ProjectCard.test.tsx
          src/components/portfolio/__tests__/GitHubProjectsSection.test.tsx
          src/lib/security/publicPrivacyHardening.test.ts
          src/pages/__tests__/PortfolioEditorPage.test.tsx
          src/pages/__tests__/PortfolioEditorPage-D8.test.tsx
