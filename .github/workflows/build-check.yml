name: Check: Build (No Deploy)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🏗️ BUILD CHECK — Does a full production build of the app without
          deploying it anywhere. Use this to confirm the app compiles
          successfully before you run the real deploy. If this passes,
          the deploy should pass too. Catches errors that the type-check
          alone might miss. Takes about 2 minutes. Leave this field as-is
          and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, run the build check'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Report build success
        run: |
          echo "✅ Build completed successfully."
          echo ""
          echo "=== Build output size ==="
          du -sh dist/
