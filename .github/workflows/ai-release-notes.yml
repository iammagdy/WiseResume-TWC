name: AI Release Notes Generator

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          📝 AI RELEASE NOTES — Uses GitHub Models (free with GitHub Pro, no
          extra tokens from your platform) to read your recent commits and
          auto-generate user-friendly release notes in plain English (not
          technical git messages). Creates a release and saves notes as an
          artifact. No AI tokens from your vibe coding platform needed. Takes
          about 1 minute. Leave this field as-is and click "Run workflow" to
          proceed.
        type: string
        required: false
        default: 'Yes, generate release notes'

jobs:
  generate-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Get recent commits
        id: commits
        run: |
          COMMITS=$(git log --oneline -20 --no-decorate)
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate release notes with AI
        id: ai-notes
        run: |
          COMMITS='${{ steps.commits.outputs.commits }}'

          RESPONSE=$(curl -s -X POST \
            "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @- << 'EOF'
          {
            "model": "gpt-4o",
            "messages": [
              {
                "role": "system",
                "content": "You are a helpful assistant that writes clear, user-friendly release notes. Take technical commit messages and convert them into friendly, easy-to-understand updates for non-technical users. Use bullet points and simple language."
              },
              {
                "role": "user",
                "content": "Here are the recent commits. Please write friendly release notes that users would understand:\n\n$COMMITS"
              }
            ],
            "temperature": 0.7,
            "max_tokens": 500
          }
          EOF
          )

          NOTES=$(echo "$RESPONSE" | python3 -c "import sys,json; data=json.load(sys.stdin); print(data['choices'][0]['message']['content'])" 2>/dev/null || echo "AI release notes generation failed")

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Save release notes as artifact
        run: |
          mkdir -p release-artifacts
          cat > release-artifacts/RELEASE_NOTES.md << 'EOF'
          # Release Notes

          ${{ steps.ai-notes.outputs.notes }}

          ---
          *Generated by AI Release Notes GitHub Action*
          EOF
          echo "✅ Release notes generated and saved."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-${{ github.run_number }}
          path: release-artifacts/RELEASE_NOTES.md
          retention-days: 30
