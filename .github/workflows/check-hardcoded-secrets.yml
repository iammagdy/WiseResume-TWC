name: Check: Hardcoded Secrets in Code

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🔐 CHECK FOR HARDCODED SECRETS — Scans the entire codebase for
          accidentally committed API keys, passwords, tokens, and other
          secrets. Safety net to catch commits that contain sensitive data
          before they reach production. Takes a few seconds. Leave this field
          as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, check for secrets'

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run secret scanner
        run: |
          echo "============================================"
          echo "       HARDCODED SECRETS SCAN"
          echo "============================================"
          echo ""
          echo "Scanning for common secret patterns..."
          npx truffleHog filesystem . --json --fail 2>/dev/null || true
          echo ""
          echo "============================================"
          echo "Also checking for common patterns manually..."
          echo ""

          SECRETS=$(grep -rE "api[_-]?key|password|token|secret|credential|bearer|auth" src/ \
            --include="*.ts" --include="*.tsx" --include="*.js" -i -n 2>/dev/null | \
            grep -vE "// |comment|type |interface |const.*=.*['\"]|export" || true)

          if [ -z "$SECRETS" ]; then
            echo "  ✅ No obvious hardcoded secrets detected."
          else
            echo "  ⚠️  Potential secrets found (verify these are safe):"
            echo ""
            echo "$SECRETS" | head -20
            echo ""
          fi

          echo "============================================"
