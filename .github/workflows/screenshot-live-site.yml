name: Check: Screenshot Live Site

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          📸 SCREENSHOT LIVE SITE — Takes an automatic screenshot of your
          live website and saves it as a downloadable image (artifact). Use
          this after a deployment to visually confirm the site looks correct
          without opening a browser. The screenshot file is kept for 7 days
          and can be downloaded from the Action run summary page. Takes
          about 1 minute. Leave this field as-is and click "Run workflow"
          to proceed.
        type: string
        required: false
        default: 'Yes, take a screenshot'

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright dependencies
        run: npx playwright install chromium --with-deps 2>&1 | tail -5

      - name: Take screenshot of live site
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.setViewportSize({ width: 1440, height: 900 });
            console.log('Opening live site...');
            await page.goto('https://thewise.cloud/resume/', { waitUntil: 'networkidle', timeout: 30000 });
            await page.waitForTimeout(3000);
            await page.screenshot({ path: 'screenshot-desktop.png', fullPage: false });
            console.log('Desktop screenshot saved.');
            await page.setViewportSize({ width: 390, height: 844 });
            await page.waitForTimeout(1000);
            await page.screenshot({ path: 'screenshot-mobile.png', fullPage: false });
            console.log('Mobile screenshot saved.');
            await browser.close();
          })();
          " 2>&1

      - name: Upload screenshots as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: live-site-screenshots-${{ github.run_number }}
          path: |
            screenshot-desktop.png
            screenshot-mobile.png
          retention-days: 7
