name: Find All TODOs & FIXMEs

on:
  # workflow_dispatch:
    inputs:
      confirm:
        description: >
          📋 FIND ALL TODOS & FIXMES — Scans every file in the codebase and
          lists all TODO, FIXME, HACK, and XXX comments with their file name
          and line number. Instead of asking AI "what needs to be done?", run
          this to see everything instantly. Great for understanding what's
          left to do. Takes a few seconds. Leave this field as-is and click
          "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, find TODOs'

jobs:
  find-todos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find all TODOs and FIXMEs
        run: |
          echo "============================================"
          echo "        ALL TODOs & FIXMEs IN CODEBASE"
          echo "============================================"
          echo ""

          TODOS=$(grep -r "TODO\|FIXME\|HACK\|XXX" src/ --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" -n 2>/dev/null || true)

          if [ -z "$TODOS" ]; then
            echo "  ✅ No TODOs found — codebase is clean!"
          else
            echo "  Found items to address:"
            echo ""
            echo "$TODOS" | while read -r line; do
              echo "  📌 $line"
            done
            echo ""
            COUNT=$(echo "$TODOS" | wc -l)
            echo "  Total: $COUNT items to address"
          fi

          echo ""
          echo "============================================"
