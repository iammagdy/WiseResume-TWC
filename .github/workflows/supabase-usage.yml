name: Supabase Usage Monitor

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          📈 SUPABASE USAGE MONITOR — Checks how much of your Supabase free
          tier you have used this month: database size, storage, edge function
          invocations, and bandwidth. Warns you before you hit a limit and
          the app stops working. Good to run once a month or when the app
          feels slow. Requires SUPABASE_ACCESS_TOKEN secret. Takes a few
          seconds. Leave this field as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, check my Supabase usage'

jobs:
  usage:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check Supabase project usage
        run: |
          echo "============================================"
          echo "        SUPABASE USAGE REPORT"
          echo "============================================"
          echo ""
          echo "Fetching project info..."
          supabase projects list 2>&1 | grep -A5 "jnsfmkzgxsviuthaqlyy" || true
          echo ""
          echo "Fetching usage stats..."
          supabase --project-ref jnsfmkzgxsviuthaqlyy status 2>&1 || true
          echo ""
          echo "============================================"
          echo "Free tier limits for reference:"
          echo "  Database    : 500 MB"
          echo "  Storage     : 1 GB"
          echo "  Edge Funcs  : 500,000 invocations / month"
          echo "  Bandwidth   : 5 GB / month"
          echo "============================================"
          echo ""
          echo "ℹ️  For full usage details, visit:"
          echo "    https://supabase.com/dashboard/project/jnsfmkzgxsviuthaqlyy/settings/billing"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
