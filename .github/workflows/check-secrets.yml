name: Check: Secrets Configured

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🔑 CHECK SECRETS — Shows which GitHub secrets are set and which are
          missing, without revealing the actual values. Run this when an action
          is failing and you suspect a missing secret is the cause. Takes a
          few seconds. Leave this field as-is and click "Run workflow" to
          proceed.
        type: string
        required: false
        default: 'Yes, check my secrets'

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check all required secrets
        run: |
          echo "============================================"
          echo "       GITHUB SECRETS STATUS CHECK"
          echo "============================================"
          echo ""

          check_secret() {
            local name=$1
            local value=$2
            local usage=$3
            if [ -n "$value" ]; then
              echo "  ✅ $name"
              echo "     Used by: $usage"
            else
              echo "  ❌ $name — NOT SET"
              echo "     Used by: $usage"
            fi
            echo ""
          }

          check_secret "VITE_SUPABASE_URL" \
            "${{ secrets.VITE_SUPABASE_URL }}" \
            "Deploy Frontend, Build Check, Bundle Size, Smoke Test, Purge Cache"

          check_secret "VITE_SUPABASE_PUBLISHABLE_KEY" \
            "${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            "Deploy Frontend, Build Check, Bundle Size, Smoke Test, Purge Cache"

          check_secret "FTP_PASSWORD" \
            "${{ secrets.FTP_PASSWORD }}" \
            "Deploy Frontend, Rollback Frontend"

          check_secret "SUPABASE_ACCESS_TOKEN" \
            "${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            "Deploy Edge Functions, Database Migration, Database Backup, Edge Function Logs"

          check_secret "SUPABASE_DB_PASSWORD" \
            "${{ secrets.SUPABASE_DB_PASSWORD }}" \
            "Database Migration, Database Backup"

          check_secret "SUPABASE_SERVICE_ROLE_KEY" \
            "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            "Purge Cache"

          echo "============================================"
          echo "To add a missing secret:"
          echo "GitHub → Settings → Secrets and variables"
          echo "→ Actions → New repository secret"
          echo "============================================"
        env:
          SECRET_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
