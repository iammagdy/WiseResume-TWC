name: Deploy Email Service

# One-click deploy for email-service only.
# Deploys the function, sets all variables, and blanks Appwrite's built-in
# email templates so they don't fire alongside our Resend emails.
#
# Trigger: GitHub → Actions → Deploy Email Service → Run workflow
# Branch:  select the branch you want to deploy from (e.g. claude/atlas-onboarding-GqwrK)

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy email-service to Appwrite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install script dependencies
        run: npm install node-appwrite

      - name: Deploy email-service + blank auth templates
        env:
          APPWRITE_ENDPOINT:   "https://fra.cloud.appwrite.io/v1"
          APPWRITE_PROJECT_ID: "69fd362b001eb325a192"
          APPWRITE_API_KEY:    ${{ secrets.APPWRITE_API_KEY }}
          DEVKIT_PASSWORD:     ${{ secrets.DEVKIT_PASSWORD }}
          RESEND_API_KEY:      ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL:   ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_FROM_NAME:    ${{ secrets.RESEND_FROM_NAME }}
          FRONTEND_URL:        "https://resume.thewise.cloud"
        run: node scripts/deploy_email_service.cjs
