name: Deploy Appwrite Hubs

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Hub target to deploy ("all" or comma-separated hub ids)'
        required: false
        default: 'all'

concurrency:
  group: deploy-appwrite-hubs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Recompute hub source hashes
        run: node scripts/compute-source-hashes.mjs

      - name: Ensure source hash manifest is committed
        run: git diff --exit-code -- src/lib/devkit/sourceHashes.generated.json

      - name: Ensure observability schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_observability_schema.cjs

      - name: Ensure app settings schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' || contains(github.event.inputs.target, 'inspect-ai-keys') }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_app_settings_schema.cjs

      - name: Ensure AI logs schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_ai_logs_schema.cjs

      - name: Ensure idempotency cache schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_idempotency_schema.cjs

      - name: Ensure company briefings schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_company_briefings_schema.cjs

      - name: Ensure tailoring lineage schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_tailoring_lineage_schema.cjs

      - name: Ensure security collections schema (FIX-16)
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup-security-collections.cjs

      - name: Ensure AI credits schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_ai_credits_schema.cjs

      - name: Ensure edge function logs schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_edge_function_logs_schema.cjs

      - name: Ensure error log schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_error_log_schema.cjs

      - name: Ensure discount codes schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_discount_codes_schema.cjs

      - name: Ensure feature flags schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_feature_flags_schema.cjs

      - name: Ensure WiseHire collections schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_wisehire_collections_schema.cjs

      - name: Ensure AI routing config schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_ai_routing_config_schema.cjs

      - name: Ensure contact requests schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_contact_requests_schema.cjs

      - name: Ensure audit logs schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_audit_logs_schema.cjs

      - name: Ensure impersonation sessions schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' || contains(github.event.inputs.target, 'admin-devkit-data') || contains(github.event.inputs.target, 'admin-impersonate') }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_impersonation_sessions_schema.cjs

      - name: Ensure notifications schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_notifications_schema.cjs

      - name: Ensure remote jobs feed schema
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == '' || contains(github.event.inputs.target, 'job-feed-sync') || contains(github.event.inputs.target, 'get-remote-jobs') || contains(github.event.inputs.target, 'track-job-action') }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_remote_jobs_feed_schema.cjs

      - name: Deploy Appwrite hubs
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          OPENROUTER_KEY_1: ${{ secrets.OPENROUTER_KEY_1 }}
          OPENROUTER_KEY_2: ${{ secrets.OPENROUTER_KEY_2 }}
          OPENROUTER_KEY_3: ${{ secrets.OPENROUTER_KEY_3 }}
          GROQ_KEY_1: ${{ secrets.GROQ_KEY_1 }}
          GROQ_KEY_2: ${{ secrets.GROQ_KEY_2 }}
          GROQ_KEY_3: ${{ secrets.GROQ_KEY_3 }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          NVIDIA_KEY_1: ${{ secrets.NVIDIA_KEY_1 }}
          NVIDIA_KEY_2: ${{ secrets.NVIDIA_KEY_2 }}
          NVIDIA_KEY_3: ${{ secrets.NVIDIA_KEY_3 }}
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: ${{ secrets.DD_SITE }}
          DEVKIT_PASSWORD: ${{ secrets.DEVKIT_PASSWORD }}
          IMPERSONATION_HMAC_SECRET: ${{ secrets.IMPERSONATION_HMAC_SECRET }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          PUBLIC_SHARE_TOKEN_SECRET: ${{ secrets.PUBLIC_SHARE_TOKEN_SECRET }}
          GATEWAY_SMOKE_SECRET: ${{ secrets.GATEWAY_SMOKE_SECRET }}
          ADMIN_TEST_HMAC_SECRET: ${{ secrets.ADMIN_TEST_HMAC_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_FROM_NAME: ${{ secrets.RESEND_FROM_NAME }}
          RESEND_SEGMENT_ALL_USERS: ${{ secrets.RESEND_SEGMENT_ALL_USERS }}
          RESEND_AUDIENCE_ALL_USERS: ${{ secrets.RESEND_AUDIENCE_ALL_USERS }}
          GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
          GITHUB_REPO: iammagdy/WiseResume-TWC
          FRONTEND_URL: https://wiseresume.app
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_ORG_SLUG: ${{ secrets.SENTRY_ORG_SLUG }}
          SENTRY_PROJECT_SLUG: ${{ secrets.SENTRY_PROJECT_SLUG }}
          SENTRY_WEBHOOK_SECRET: ${{ secrets.SENTRY_WEBHOOK_SECRET }}
          JINA_READER_API_KEY: ${{ secrets.JINA_READER_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          PORTFOLIO_JWT_SECRET: ${{ secrets.PORTFOLIO_JWT_SECRET }}
          PASSWORD_RESET_OTP_SECRET: ${{ secrets.PASSWORD_RESET_OTP_SECRET }}
          HUB_TARGET: ${{ github.event.inputs.target || 'all' }}
        run: |
          if [ "${HUB_TARGET}" = "all" ]; then
            node scripts/deploy_hubs.cjs
          else
            node scripts/deploy_hubs.cjs --only="${HUB_TARGET}"
          fi

      - name: Trigger remote job feed sync
        if: ${{ contains(github.event.inputs.target, 'job-feed-sync') }}
        env:
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/trigger-sync.cjs
