name: 🧠 Deploy AI Hubs

on:
  # workflow_dispatch:

jobs:
  deploy-hubs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Appwrite SDK
        run: npm install node-appwrite

      - name: Package and Deploy Hubs
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69fd362b001eb325a192
        run: |
          cd appwrite-hubs/auth-master && tar -czf ../../auth-master.tar.gz . && cd ../..
          cd appwrite-hubs/ai-gateway && tar -czf ../../ai-gateway.tar.gz . && cd ../..
          node -e "
          const sdk = require('node-appwrite');
          const { InputFile } = require('node-appwrite/file');
          const functions = new sdk.Functions(new sdk.Client().setEndpoint(process.env.APPWRITE_ENDPOINT).setProject(process.env.APPWRITE_PROJECT_ID).setKey(process.env.APPWRITE_API_KEY));
          
          async function run() {
            try {
              console.log('Uploading Hubs...');
              await functions.createDeployment('auth-master', InputFile.fromPath('auth-master.tar.gz', 'code.tar.gz'), true, 'src/main.js');
              await functions.createDeployment('ai-gateway', InputFile.fromPath('ai-gateway.tar.gz', 'code.tar.gz'), true, 'src/main.js');
              console.log('✅ Success!');
            } catch(e) { console.error(e.message); process.exit(1); }
          }
          run();
          "
