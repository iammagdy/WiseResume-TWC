name: Deploy AI Hubs

# Hub deployment is intentionally manual-only (workflow_dispatch).
# Hubs are deployed via DevKit → Deploy AI Hubs, or by running this workflow manually.
# Do NOT add a push: trigger — hub deploys must be deliberate, not automatic.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deploy dependencies
        run: npm install node-appwrite

      - name: Build hubs
        run: |
          build_hub() {
            local dir="$1"
            local archive="$2"
            echo "::group::Building ${dir}"
            cd "appwrite-hubs/${dir}"
            if [ -f package.json ]; then npm install --omit=dev; fi
            tar -czf "../../${archive}" .
            cd ../..
            tar -tzf "${archive}" | grep -q '^./src/main.js$' || {
              echo "::error::${archive} does not contain src/main.js at archive root"
              exit 1
            }
            echo "::endgroup::"
          }

          build_hub resume-section-ai resume-section-ai.tar.gz
          build_hub job-import job-import.tar.gz
          build_hub ai-gateway ai-gateway.tar.gz
          build_hub coupons coupons.tar.gz
          build_hub wisehire-gateway wisehire-gateway.tar.gz
          build_hub public-share public-share.tar.gz
          build_hub ai-health ai-health.tar.gz
          build_hub admin-devkit-data admin-devkit-data.tar.gz
          build_hub admin-email admin-email.tar.gz
          build_hub admin-testmail admin-testmail.tar.gz
          build_hub admin-feature-flags admin-feature-flags.tar.gz
          build_hub admin-moderation admin-moderation.tar.gz
          build_hub admin-portfolio-usernames admin-portfolio-usernames.tar.gz
          build_hub admin-visitor-analytics admin-visitor-analytics.tar.gz
          build_hub admin-onboarding-funnel admin-onboarding-funnel.tar.gz
          build_hub admin-impersonate admin-impersonate.tar.gz
          build_hub inspect-ai-keys inspect-ai-keys.tar.gz
          build_hub admin-deploy-hubs admin-deploy-hubs.tar.gz

      - name: Setup Appwrite schema
        env:
          APPWRITE_ENDPOINT: "https://fra.cloud.appwrite.io/v1"
          APPWRITE_PROJECT_ID: "69fd362b001eb325a192"
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: node scripts/setup_observability_schema.cjs

      - name: Deploy hubs
        env:
          APPWRITE_ENDPOINT: "https://fra.cloud.appwrite.io/v1"
          APPWRITE_PROJECT_ID: "69fd362b001eb325a192"
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          OPENROUTER_KEY_2: ${{ secrets.OPENROUTER_KEY_2 }}
          OPENROUTER_KEY_1: ${{ secrets.OPENROUTER_KEY_1 }}
          GROQ_KEY_1: ${{ secrets.GROQ_KEY_1 }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          NVIDIA_KEY_1: ${{ secrets.NVIDIA_KEY_1 }}
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          DEVKIT_PASSWORD: ${{ secrets.DEVKIT_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_FROM_NAME: ${{ secrets.RESEND_FROM_NAME }}
          GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
          GITHUB_REPO: iammagdy/WiseResume-TWC
        run: node scripts/deploy_hubs.cjs
