name: 🧠 Deploy AI Hubs

on:
  push:
    paths:
      - 'appwrite-hubs/**'
      - 'scripts/deploy_hubs.cjs'
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-hubs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Appwrite SDK
        run: npm install node-appwrite

      - name: Package and Deploy Hubs
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          # 1. Create Tarballs in Root
          cd appwrite-hubs/auth-master && tar -czf ../../auth-master.tar.gz . && cd ../..
          cd appwrite-hubs/ai-gateway && tar -czf ../../ai-gateway.tar.gz . && cd ../..
          
          # 2. Deploy using Fixed Script
          export APPWRITE_ENDPOINT="https://fra.cloud.appwrite.io/v1"
          export APPWRITE_PROJECT_ID="69fd362b001eb325a192"
          node scripts/deploy_hubs.cjs
