name: 🧠 Deploy AI Hubs

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy AI Hubs
        run: |
          # 1. Install deployment script dependencies
          npm install node-appwrite

          # 2. Setup auth-master
          cd appwrite-hubs/auth-master
          npm install --omit=dev
          tar -czf ../../auth-master.tar.gz .
          cd ../..

          # 3. Setup ai-gateway
          cd appwrite-hubs/ai-gateway
          npm install --omit=dev
          tar -czf ../../ai-gateway.tar.gz .
          cd ../..

          # 4. Setup ai-health
          cd appwrite-hubs/ai-health
          tar -czf ../../ai-health.tar.gz .
          cd ../..

          # 5. Setup admin-devkit-data
          cd appwrite-hubs/admin-devkit-data
          npm install --omit=dev
          tar -czf ../../admin-devkit-data.tar.gz .
          cd ../..

          # 6. Run schema setup (idempotent — safe to re-run)
          export APPWRITE_ENDPOINT="https://fra.cloud.appwrite.io/v1"
          export APPWRITE_PROJECT_ID="69fd362b001eb325a192"
          export APPWRITE_API_KEY="${{ secrets.APPWRITE_API_KEY }}"
          node scripts/setup_observability_schema.cjs

          # 7. Execute deployment script from the root
          node scripts/deploy_hubs.cjs

