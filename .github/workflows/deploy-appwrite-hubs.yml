name: 🧠 Deploy AI Hubs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-hubs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Appwrite SDK
        run: npm install node-appwrite

      - name: Deploy Hubs
        env:
          APPWRITE_ENDPOINT: ${{ secrets.VITE_APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          cd appwrite-hubs/auth-master
          tar -czf ../auth-master.tar.gz .
          cd ../ai-gateway
          tar -czf ../ai-gateway.tar.gz .
          cd ..
          node -e "
          const { Client, Functions, InputFile } = require('node-appwrite');
          const client = new Client().setEndpoint(process.env.APPWRITE_ENDPOINT).setProject(process.env.APPWRITE_PROJECT_ID).setKey(process.env.APPWRITE_API_KEY);
          const functions = new Functions(client);
          
          async function run() {
            try {
              const d1 = await functions.createDeployment('auth-master', InputFile.fromPath('auth-master.tar.gz', 'code.tar.gz'), true, 'src/main.js');
              console.log('Auth-Master Deployed:', d1.$id);
              const d2 = await functions.createDeployment('ai-gateway', InputFile.fromPath('ai-gateway.tar.gz', 'code.tar.gz'), true, 'src/main.js');
              console.log('AI-Gateway Deployed:', d2.$id);
            } catch(e) { console.error(e.message); process.exit(1); }
          }
          run();
          "
