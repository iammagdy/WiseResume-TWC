name: 🧠 Deploy AI Hubs

on:
  push:
    paths:
      - 'appwrite-hubs/**'
      - 'scripts/deploy_hubs.cjs'
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-hubs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Appwrite SDK
        run: npm install node-appwrite

      - name: Package and Deploy Hubs
        env:
          APPWRITE_ENDPOINT: ${{ secrets.VITE_APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          cd appwrite-hubs/auth-master && tar -czf ../../auth-master.tar.gz . && cd ../..
          cd appwrite-hubs/ai-gateway && tar -czf ../../ai-gateway.tar.gz . && cd ../..
          node scripts/deploy_hubs.cjs
