name: Deploy AI Hubs

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy AI Hubs
        run: |
          # 1. Install deployment script dependencies
          npm install node-appwrite

          # 2. Build every deployed hub from source. Do not reuse stale root
          # tarballs; DevKit admin panels depend on these functions staying
          # aligned with the signed-token frontend contract.
          build_hub() {
            local dir="$1"
            local archive="$2"
            echo "Building ${dir} -> ${archive}"
            cd "appwrite-hubs/${dir}"
            if [ -f package.json ]; then npm install --omit=dev; fi
            tar -czf "../../${archive}" .
            cd ../..
            tar -tzf "${archive}" | head -20 | grep -q '^./src/main.js$' || {
              echo "::error::${archive} does not contain src/main.js at archive root"
              exit 1
            }
          }

          build_hub auth-master auth-master.tar.gz
          build_hub resume-section-ai resume-section-ai.tar.gz
          build_hub ai-gateway ai-gateway.tar.gz
          build_hub coupons coupons.tar.gz
          build_hub wisehire-gateway wisehire-gateway.tar.gz
          build_hub public-share public-share.tar.gz
          build_hub ai-health ai-health.tar.gz
          build_hub admin-devkit-data admin-devkit-data.tar.gz
          build_hub admin-email admin-email.tar.gz
          build_hub admin-testmail admin-testmail.tar.gz
          build_hub admin-feature-flags admin-feature-flags.tar.gz
          build_hub admin-moderation admin-moderation.tar.gz
          build_hub admin-portfolio-usernames admin-portfolio-usernames.tar.gz
          build_hub admin-visitor-analytics admin-visitor-analytics.tar.gz
          build_hub admin-onboarding-funnel admin-onboarding-funnel.tar.gz
          build_hub admin-impersonate admin-impersonate.tar.gz
          build_hub inspect-ai-keys inspect-ai-keys.tar.gz

          # 3. Run schema setup (idempotent - safe to re-run)
          export APPWRITE_ENDPOINT="https://fra.cloud.appwrite.io/v1"
          export APPWRITE_PROJECT_ID="69fd362b001eb325a192"
          export APPWRITE_API_KEY="${{ secrets.APPWRITE_API_KEY }}"
          node scripts/setup_observability_schema.cjs

          # 4. Execute deployment script from the root
          export OPENROUTER_KEY_2="${{ secrets.OPENROUTER_KEY_2 }}"
          export OPENROUTER_KEY_1="${{ secrets.OPENROUTER_KEY_1 }}"
          export GROQ_KEY_1="${{ secrets.GROQ_KEY_1 }}"
          export DEEPSEEK_KEY="${{ secrets.DEEPSEEK_KEY }}"
          export NVIDIA_KEY_1="${{ secrets.NVIDIA_KEY_1 }}"
          export DEVKIT_PASSWORD="${{ secrets.DEVKIT_PASSWORD }}"
          export RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
          export RESEND_FROM_EMAIL="${{ secrets.RESEND_FROM_EMAIL }}"
          export RESEND_FROM_NAME="${{ secrets.RESEND_FROM_NAME }}"
          node scripts/deploy_hubs.cjs
