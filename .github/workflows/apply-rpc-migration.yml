name: Apply SQL via Management API

# Use this workflow to apply any SQL (DDL or DML) to the production Supabase database
# via the management API. This bypasses the Supabase CLI and SUPABASE_DB_PASSWORD,
# which is useful when the db-migration.yml workflow fails due to migration history
# conflicts (duplicate key in supabase_migrations.schema_migrations).
#
# REQUIRED GitHub Secrets:
#   SUPABASE_ACCESS_TOKEN  — Supabase personal access token (management API)
#   SUPABASE_PROJECT_REF   — Supabase project ref (e.g. jnsfmkzgxsviuthaqlyy)
#
# USAGE:
#   1. Go to Actions → "Apply SQL via Management API" → Run workflow
#   2. Enter the path to the SQL file (e.g. supabase/migrations/20260412200000_add_upsert_ai_credits_limit_rpc.sql)
#      OR leave blank to apply the default upsert_ai_credits_limit RPC migration.

on:
  workflow_dispatch:
    inputs:
      sql_file:
        description: >
          Path to the SQL file to apply (relative to repo root).
          Leave blank to apply the default upsert_ai_credits_limit RPC migration.
        type: string
        required: false
        default: 'supabase/migrations/20260412200000_add_upsert_ai_credits_limit_rpc.sql'

jobs:
  apply-sql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply SQL via Supabase management API
        run: |
          SQL_FILE="${{ github.event.inputs.sql_file }}"
          if [ -z "$SQL_FILE" ]; then
            SQL_FILE="supabase/migrations/20260412200000_add_upsert_ai_credits_limit_rpc.sql"
          fi

          if [ ! -f "$SQL_FILE" ]; then
            echo "::error::SQL file not found: $SQL_FILE"
            exit 1
          fi

          echo "Applying SQL from: $SQL_FILE"
          SQL=$(cat "$SQL_FILE")
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SQL" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "::error::Failed to apply SQL (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
          echo "✅ SQL applied successfully from $SQL_FILE"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
