name: Apply SQL RPC via Management API

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Apply upsert_ai_credits_limit RPC migration via Supabase management API"
        type: string
        required: false
        default: 'Yes, apply RPC migration'

jobs:
  apply-rpc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply upsert_ai_credits_limit RPC via management API
        run: |
          SQL=$(cat supabase/migrations/20260412200000_add_upsert_ai_credits_limit_rpc.sql)
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SQL" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Failed to apply migration (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
          echo "✅ upsert_ai_credits_limit RPC applied successfully"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
