name: Purge Cache

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🗑️ PURGE CACHE — Calls the hard-purge edge function to clear any
          server-side cached data on Supabase. Use this if users are seeing
          stale or outdated data after a deployment and a regular refresh
          did not fix it. Requires VITE_SUPABASE_URL and
          SUPABASE_SERVICE_ROLE_KEY secrets to be set. Takes a few seconds.
          Leave this field as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, purge the cache'

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Call hard-purge edge function
        run: |
          echo "Calling hard-purge edge function..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.VITE_SUPABASE_URL }}/functions/v1/hard-purge" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json")
          echo "Response status: $RESPONSE"
          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
            echo "✅ Cache purged successfully."
          else
            echo "⚠️ Purge returned status $RESPONSE — check function logs in Supabase dashboard."
            exit 1
          fi
