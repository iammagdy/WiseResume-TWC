name: Generate Supabase Types

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🗂️ GENERATE SUPABASE TYPES — Uses the Supabase CLI to auto-generate
          TypeScript types from your actual database schema and saves the file
          to src/integrations/supabase/types.ts. Instead of asking AI to write
          types, this generates them directly from the real DB. Run this after
          any database migration to keep types in sync. Requires
          SUPABASE_ACCESS_TOKEN secret. Takes a few seconds. Leave this field
          as-is and click "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, generate types'

jobs:
  generate-types:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Generate TypeScript types from Supabase schema
        run: |
          echo "Generating TypeScript types from Supabase schema..."
          mkdir -p src/integrations/supabase
          supabase gen types typescript --project-ref jnsfmkzgxsviuthaqlyy > src/integrations/supabase/types.ts
          echo "✅ Types generated at src/integrations/supabase/types.ts"
          echo ""
          echo "File size: $(wc -l < src/integrations/supabase/types.ts) lines"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Commit types if changed
        run: |
          if git diff --quiet src/integrations/supabase/types.ts; then
            echo "ℹ️  No changes to types — already up to date."
          else
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add src/integrations/supabase/types.ts
            git commit -m "chore: auto-generate Supabase types from schema

Generated by GitHub Actions workflow.

Co-Authored-By: GitHub Actions <actions@github.com>"
            git push
            echo "✅ Types committed and pushed."
          fi
