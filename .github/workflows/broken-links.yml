name: Check: Broken Links

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          🔗 BROKEN LINKS CHECKER — Crawls your live website and reports any
          broken links or missing pages (404 errors). Good to run after big
          changes to navigation, routing, or page structure to make sure
          nothing is pointing to a page that no longer exists. Takes 1-3
          minutes depending on site size. Leave this field as-is and click
          "Run workflow" to proceed.
        type: string
        required: false
        default: 'Yes, check for broken links'

jobs:
  broken-links:
    runs-on: ubuntu-latest
    steps:
      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --accept 200,201,202,203,204,206,301,302,307,308
            --exclude-mail
            --max-depth 3
            https://thewise.cloud/resume/
          fail: false
