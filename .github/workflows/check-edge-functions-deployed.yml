name: Check Edge Functions Are Deployed

# Catch source/deployment drift before users hit a missing endpoint:
# any edge function that exists in supabase/functions/ but has not been
# deployed to the project causes this job to fail with an actionable error.
#
# As of Task #68 (Phase 4), this job also enforces the four other parity
# rules codified in scripts/check-edge-functions-deployed.mjs (config,
# auth-posture, callers, freshness). The full set runs on push to main and
# on a daily schedule; PRs that touch supabase/functions or this workflow
# run the full set too so contributors see drift before merge.
#
# Uses the existing SUPABASE_ACCESS_TOKEN secret (Management API) and
# performs unauthenticated POST probes against the public Supabase
# functions URL — no JWT is minted, no real handler logic is exercised.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - 'scripts/check-edge-functions-deployed.mjs'
      - 'scripts/edge-fn-drift-allowlist.json'
      - '.github/workflows/check-edge-functions-deployed.yml'
      # Caller-parity drift can be introduced by any change to the source
      # trees that may add/remove edge-function callsites. Include the
      # entire app/server/mobile surfaces so a PR that only touches
      # callers (not supabase/functions/) still gets the parity check
      # pre-merge — otherwise drift would only surface on the post-merge
      # push to main.
      - 'src/**'
      - 'mobile/**'
      - 'server/**'
  schedule:
    # Daily at 06:17 UTC — pick an off-peak time to avoid clashing with
    # business-hours deploy retries. Reschedule freely; the only contract
    # is "runs at least once per day".
    - cron: '17 6 * * *'
  workflow_dispatch:

jobs:
  check-deployed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run full edge-function drift check (--all)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          mkdir -p reports
          node scripts/check-edge-functions-deployed.mjs --all \
            --json=reports/edge-fn-drift-latest.json

      - name: Upload drift report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edge-fn-drift-report
          path: reports/edge-fn-drift-latest.json
          retention-days: 30
