<!doctype html>
<html lang="en" style="background-color: #111111">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual" />
  <title>Wiseresume AI - AI Resume Editor</title>
  <meta name="description" content="AI-powered resume editor with job match scoring, gap analysis, and ATS-friendly templates. Optimize your resume for any job.">
  <meta name="author" content="Wiseresume AI" />
  <meta name="theme-color" content="#4F46E5" />

  <!-- Preconnect to external origins for faster resource loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Load Inter font with display=swap for non-blocking rendering -->
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  </noscript>

  <!-- PWA & Mobile -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preload" href="/favicon.png" as="image" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <!-- black-translucent lets the app render under the iOS status bar (safe-area handles insets) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- Short name displayed under the icon on the iOS home screen -->
  <meta name="apple-mobile-web-app-title" content="Wiseresume AI" />
  <meta name="format-detection" content="telephone=no" />

  <!-- iOS PWA splash screens (prevents white flash on launch from home screen) -->
  <!-- iPhone SE / 5s -->
  <link rel="apple-touch-startup-image"
    media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)"
    href="/icons/icon-512x512.png" />
  <!-- iPhone 8 / SE 2 -->
  <link rel="apple-touch-startup-image"
    media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)"
    href="/icons/icon-512x512.png" />
  <!-- iPhone X / XS / 11 Pro -->
  <link rel="apple-touch-startup-image"
    media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)"
    href="/icons/icon-512x512.png" />
  <!-- iPhone XR / 11 -->
  <link rel="apple-touch-startup-image"
    media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)"
    href="/icons/icon-512x512.png" />
  <!-- iPhone 12 / 13 / 14 -->
  <link rel="apple-touch-startup-image"
    media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
    href="/icons/icon-512x512.png" />
  <!-- iPhone 14 Pro / 15 -->
  <link rel="apple-touch-startup-image"
    media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
    href="/icons/icon-512x512.png" />
  <!-- iPhone 14 Plus / 15 Plus -->
  <link rel="apple-touch-startup-image"
    media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
    href="/icons/icon-512x512.png" />

  <script>
    // SPA redirect: restore deep-link path saved by 404.html
    (function () {
      var r = sessionStorage.getItem('spa-redirect');
      if (r) { sessionStorage.removeItem('spa-redirect'); history.replaceState(null, '', r); }
    })();
  </script>
  <!-- Global Theme Script -->
  <script>
    (function () {
      var t = 'dark';
      try {
        var raw = localStorage.getItem('wiseresume-settings');
        if (raw) { t = JSON.parse(raw).state.theme || 'dark'; }
        else { t = localStorage.getItem('theme') || 'dark'; }
      } catch (e) { }
      var resolved = t === 'system'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : t;
      document.documentElement.classList.add(resolved);
      
      // Also set a temporary data attribute for the splash screen to use
      document.documentElement.setAttribute('data-initial-theme', resolved);
    })();
  </script>

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/favicon.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:site" content="@WiseresumeAI" />
  <meta name="twitter:image" content="/favicon.png">
  <meta property="og:title" content="Wiseresume AI - AI Resume Editor">
  <meta name="twitter:title" content="Wiseresume AI - AI Resume Editor">
  <meta property="og:description"
    content="AI-powered resume editor with job match scoring, gap analysis, and ATS-friendly templates. Optimize your resume for any job.">
  <meta name="twitter:description"
    content="AI-powered resume editor with job match scoring, gap analysis, and ATS-friendly templates. Optimize your resume for any job.">
</head>

<body>
  <div id="root">
    <div id="splash-screen"
      style="position:fixed;inset:0;background:#111111;display:flex;align-items:center;justify-content:center;overflow:hidden;z-index:9999;transition: background-color 0.3s ease;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:24px;">
        <!-- Spinner container 144px -->
        <div style="position:relative;width:144px;height:144px;display:flex;align-items:center;justify-content:center;">
          <!-- Outer glow -->
          <div
            style="position:absolute;inset:-8px;border-radius:50%;background:rgba(79,70,229,0.15);animation:glowPulse 2.5s ease-in-out infinite;">
          </div>
          <!-- Ring 1 outer -->
          <div
            style="position:absolute;inset:0;border-radius:50%;border:3px solid rgba(79,70,229,0.4);border-top-color:hsl(239,84%,67%);border-right-color:rgba(79,70,229,0.6);animation:sp1 1.8s linear infinite;">
          </div>
          <!-- Ring 2 middle -->
          <div
            style="position:absolute;inset:16px;border-radius:50%;border:3px solid rgba(79,70,229,0.3);border-top-color:hsl(239,84%,67%);border-left-color:rgba(79,70,229,0.6);animation:sp2 2.4s linear infinite;">
          </div>
          <!-- Ring 3 inner -->
          <div
            style="position:absolute;inset:32px;border-radius:50%;border:3px solid rgba(79,70,229,0.3);border-bottom-color:rgba(79,70,229,0.6);border-right-color:rgba(79,70,229,0.5);animation:sp1 3s linear infinite;">
          </div>
          <!-- Logo -->
          <div
            style="position:relative;display:flex;align-items:center;justify-content:center;animation:glow 1.6s ease-in-out infinite;">
            <div style="position:absolute;width:64px;height:64px;border-radius:50%;background:rgba(79,70,229,0.15);">
            </div>
            <img id="splash-logo" src="/favicon.png" alt="" width="56" height="56"
              style="position:relative;opacity:0;transition:opacity 0.2s ease-in;filter:drop-shadow(0 0 24px rgba(79,70,229,0.4));border-radius:14px;"
              onload="this.style.opacity='1'" />
          </div>
        </div>
        <!-- Shimmer text -->
        <span
          style="font-family:'Inter',system-ui,sans-serif;font-size:14px;font-weight:500;color:rgba(255,255,255,0.5);animation:shimmer 1.8s ease-in-out infinite;">Loading...</span>
      </div>
    </div>
    <script>
      (function () {
        var screen = document.getElementById('splash-screen');
        var logo = document.getElementById('splash-logo');
        var theme = document.documentElement.getAttribute('data-initial-theme') || 'dark';

        if (screen) {
          screen.style.background = theme === 'dark' ? '#111111' : '#ffffff';
          // Update loading text color for light mode
          var text = screen.querySelector('span');
          if (text && theme === 'light') {
            text.style.color = 'rgba(0,0,0,0.4)';
          }
        }
        if (logo) {
          logo.src = theme === 'dark' ? '/logo-dark.png' : '/logo-light.png';
        }
      })();
    </script>
    <style>
      @keyframes sp1 {
        to {
          transform: rotate(360deg)
        }
      }

      @keyframes sp2 {
        to {
          transform: rotate(-360deg)
        }
      }

      @keyframes glow {

        0%,
        100% {
          transform: scale(1)
        }

        50% {
          transform: scale(1.12)
        }
      }

      @keyframes glowPulse {

        0%,
        100% {
          transform: scale(1);
          opacity: .3
        }

        50% {
          transform: scale(1.25);
          opacity: .7
        }
      }

      @keyframes shimmer {

        0%,
        100% {
          opacity: .4
        }

        50% {
          opacity: 1
        }
      }
    </style>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
