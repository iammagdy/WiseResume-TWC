<!doctype html>
<html lang="en" style="background-color: #0a0a14">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <title>Wise Resume - AI Resume Editor</title>
    <meta name="description" content="AI-powered resume editor with job match scoring, gap analysis, and ATS-friendly templates. Optimize your resume for any job." />
    <meta name="author" content="Wise AI" />
    <meta name="theme-color" content="#0a0a14" />

    <!-- Preconnect to external origins for faster resource loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Load Google Fonts with display=swap for non-blocking rendering -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" /></noscript>

    <!-- PWA & Mobile -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent lets the app render under the iOS status bar (safe-area handles insets) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Short name displayed under the icon on the iOS home screen -->
    <meta name="apple-mobile-web-app-title" content="Wise Resume" />
    <meta name="format-detection" content="telephone=no" />

    <!-- iOS PWA splash screens (prevents white flash on launch from home screen) -->
    <!-- iPhone SE / 5s -->
    <link rel="apple-touch-startup-image" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" href="/icons/icon-512x512.png" />
    <!-- iPhone 8 / SE 2 -->
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="/icons/icon-512x512.png" />
    <!-- iPhone X / XS / 11 Pro -->
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="/icons/icon-512x512.png" />
    <!-- iPhone XR / 11 -->
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="/icons/icon-512x512.png" />
    <!-- iPhone 12 / 13 / 14 -->
    <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="/icons/icon-512x512.png" />
    <!-- iPhone 14 Pro / 15 -->
    <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="/icons/icon-512x512.png" />
    <!-- iPhone 14 Plus / 15 Plus -->
    <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="/icons/icon-512x512.png" />

    <script>
      (function() {
        var t = localStorage.getItem('theme') || 'dark';
        var resolved = t === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : t;
        document.documentElement.classList.add(resolved);
      })();
    </script>

    <!-- Open Graph -->
    <meta property="og:title" content="Wise Resume - AI Resume Editor" />
    <meta property="og:description" content="Land your dream job with AI-powered resume optimization" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@WiseAI" />
    <meta name="twitter:image" content="/favicon.svg" />
  </head>

  <body>
    <div id="root">
      <div style="min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#0a0a14;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
          <div style="width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,0.1);border-top-color:hsl(355,90%,60%);animation:sp .8s linear infinite;"></div>
          <span style="font-family:system-ui,sans-serif;font-size:14px;color:rgba(255,255,255,0.5);">Loading...</span>
        </div>
      </div>
      <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
