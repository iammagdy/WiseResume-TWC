<!doctype html>
<html lang="en" style="background-color: #111111">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual" />
  <title>Wiseresume AI - AI Resume Editor</title>
  <meta name="description" content="AI-powered resume editor with job match scoring, gap analysis, and ATS-friendly templates. Optimize your resume for any job.">
  <meta name="author" content="Wiseresume AI" />
  <meta name="theme-color" content="#4F46E5" />

  <!-- Preconnect to external origins for faster resource loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Load Inter font with display=swap for non-blocking rendering -->
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  </noscript>

  <!-- PWA & Mobile -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preload" href="/favicon.png" as="image" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <!-- black-translucent lets the app render under the iOS status bar (safe-area handles insets) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- Short name displayed under the icon on the iOS home screen -->
  <meta name="apple-mobile-web-app-title" content="Wiseresume AI" />
  <meta name="format-detection" content="telephone=no" />

  <!-- iOS PWA splash screens (prevents white flash on launch from home screen) -->
  <!-- iPhone SE / 5s -->
  <link rel="apple-touch-startup-image"
    media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)"
    href="/icons/icon-512x512.png" />
  <!-- iPhone 8 / SE 2 -->
  <link rel="apple-touch-startup-image"
    media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)"
    href="/icons/icon-512x512.png" />
  <!-- iPhone X / XS / 11 Pro -->
  <link rel="apple-touch-startup-image"
    media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)"
    href="/icons/icon-512x512.png" />
  <!-- iPhone XR / 11 -->
  <link rel="apple-touch-startup-image"
    media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)"
    href="/icons/icon-512x512.png" />
  <!-- iPhone 12 / 13 / 14 -->
  <link rel="apple-touch-startup-image"
    media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
    href="/icons/icon-512x512.png" />
  <!-- iPhone 14 Pro / 15 -->
  <link rel="apple-touch-startup-image"
    media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
    href="/icons/icon-512x512.png" />
  <!-- iPhone 14 Plus / 15 Plus -->
  <link rel="apple-touch-startup-image"
    media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
    href="/icons/icon-512x512.png" />

  <script>
    // SPA redirect: restore deep-link path saved by 404.html
    (function () {
      var r = sessionStorage.getItem('spa-redirect');
      if (r) { sessionStorage.removeItem('spa-redirect'); history.replaceState(null, '', r); }
    })();
  </script>
  <!-- Global Theme Script -->
  <script>
    (function () {
      var t = 'system';
      try {
        var raw = localStorage.getItem('wiseresume-settings');
        if (raw) { t = JSON.parse(raw).state.theme || 'system'; }
        else { t = localStorage.getItem('theme') || 'system'; }
      } catch (e) { }
      var resolved = t === 'system'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : t;
      document.documentElement.classList.add(resolved);
      
      // Also set a temporary data attribute for the splash screen to use
      document.documentElement.setAttribute('data-initial-theme', resolved);
    })();
  </script>

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/favicon.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:site" content="@WiseresumeAI" />
  <meta name="twitter:image" content="/favicon.png">
  <meta property="og:title" content="Wiseresume AI - AI Resume Editor">
  <meta name="twitter:title" content="Wiseresume AI - AI Resume Editor">
  <meta property="og:description"
    content="AI-powered resume editor with job match scoring, gap analysis, and ATS-friendly templates. Optimize your resume for any job.">
  <meta name="twitter:description"
    content="AI-powered resume editor with job match scoring, gap analysis, and ATS-friendly templates. Optimize your resume for any job.">
</head>

<body>
  <div id="root">
    <style>
      @keyframes splashShockwave {
        0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 0.45; }
        100% { transform: translate(-50%, -50%) scale(2.6); opacity: 0; }
      }
      @keyframes splashGlowBreath {
        0%, 100% { opacity: 0.06; }
        50%      { opacity: 0.14; }
      }
      @keyframes splashIconPop {
        0%   { transform: scale(0.5); opacity: 0; }
        70%  { transform: scale(1.08); opacity: 1; }
        100% { transform: scale(1);    opacity: 1; }
      }
      @keyframes splashRise {
        from { transform: translateY(12px); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
      }
      @keyframes splashTaglineFade {
        from { transform: translateY(6px); opacity: 0; }
        to   { transform: translateY(0);   opacity: 1; }
      }
      #splash-name { display: flex; }
      #splash-name span {
        display: inline-block;
        opacity: 0;
        animation: splashRise 0.32s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
    </style>
    <div id="splash-screen"
      style="position:fixed;inset:0;background:#111111;display:flex;align-items:center;justify-content:center;overflow:hidden;z-index:9999;">
      <!-- Breathing glow behind icon -->
      <div id="splash-glow"
        style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:320px;height:320px;border-radius:50%;opacity:0.08;background:radial-gradient(circle,hsl(357,71%,56%) 0%,transparent 70%);pointer-events:none;animation:splashGlowBreath 2.4s ease-in-out infinite;">
      </div>
      <!-- Shockwave ring expanding outward -->
      <div id="splash-shockwave"
        style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.3);width:140px;height:140px;border-radius:50%;border:2px solid hsl(357,71%,56%);opacity:0;pointer-events:none;animation:splashShockwave 0.75s cubic-bezier(0.16, 1, 0.3, 1) forwards;">
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:0;position:relative;">
        <!-- Icon — pops in with bounce -->
        <img id="splash-logo" src="/logo-dark.png" alt="" width="72" height="72"
          style="opacity:0;border-radius:16px;animation:splashIconPop 0.6s ease-out 0.05s forwards;" />
        <!-- Brand name (letters get spans injected by inline JS for stagger) -->
        <h1 id="splash-name"
          style="font-family:'Inter',system-ui,sans-serif;font-size:24px;font-weight:700;letter-spacing:-0.02em;margin:20px 0 0;color:#ffffff;">
          WiseResume
        </h1>
        <!-- Tagline -->
        <p id="splash-tagline"
          style="font-family:'Inter',system-ui,sans-serif;font-size:14px;font-weight:400;margin:6px 0 0;color:rgba(255,255,255,0.5);opacity:0;animation:splashTaglineFade 0.4s ease-out 0.75s forwards;">
          Your AI Career Partner
        </p>
      </div>
    </div>
    <script>
      (function () {
        var splash = document.getElementById('splash-screen');
        var logo = document.getElementById('splash-logo');
        var nameEl = document.getElementById('splash-name');
        var tagline = document.getElementById('splash-tagline');
        var glow = document.getElementById('splash-glow');
        var shock = document.getElementById('splash-shockwave');
        var theme = document.documentElement.getAttribute('data-initial-theme') || 'dark';
        var isWH = window.location.pathname === '/enterprises' ||
          new URLSearchParams(window.location.search).get('for') === 'companies';
        var isDark = theme === 'dark';
        var brandColor = isWH ? '#1D4ED8' : 'hsl(357,71%,56%)';

        if (splash) {
          splash.style.background = isDark ? '#111111' : '#ffffff';
        }
        if (logo) {
          logo.src = isDark ? '/logo-dark.png' : '/logo-light.png';
          if (isWH) {
            logo.style.filter = 'hue-rotate(220deg) saturate(2) brightness(0.85)';
          }
        }
        if (glow) {
          glow.style.background = 'radial-gradient(circle,' + brandColor + ' 0%,transparent 70%)';
        }
        if (shock) {
          shock.style.borderColor = brandColor;
        }
        if (nameEl) {
          var brandName = isWH ? 'WiseHire' : 'WiseResume';
          var nameColor = isWH ? '#1D4ED8' : (isDark ? '#ffffff' : '#0f0f1a');
          nameEl.style.color = nameColor;
          // Replace text with per-letter spans for stagger animation
          nameEl.textContent = '';
          for (var i = 0; i < brandName.length; i++) {
            var s = document.createElement('span');
            s.textContent = brandName.charAt(i);
            s.style.animationDelay = (0.45 + i * 0.035) + 's';
            nameEl.appendChild(s);
          }
        }
        if (tagline) {
          tagline.textContent = isWH ? 'Hire Smarter. Screen Faster.' : 'Your AI Career Partner';
          tagline.style.color = isDark ? 'rgba(255,255,255,0.5)' : 'rgba(15,15,26,0.5)';
        }
      })();
    </script>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
