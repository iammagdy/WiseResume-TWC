<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual" />
  <title>WiseResume AI — AI Resume Builder</title>
  <meta name="description" content="Build, tailor, and optimize job-winning resumes with AI.">
  <meta name="author" content="Wiseresume AI" />

  <!-- Inter font is self-hosted via @fontsource/inter (imported in src/main.tsx).
       Eliminates blocking Google Fonts request on FCP. -->

  <!-- Multi-resolution .ico is the canonical tab icon (browsers prefer it,
       and it's also what raw URLs like /changelog.json fall back to via
       the implicit /favicon.ico request). The hi-res PNG is offered as a
       sized hint for retina/high-density displays and used for og:image. -->
  <link id="app-favicon-ico" rel="icon" href="/favicon.ico" sizes="any">
  <link id="app-favicon" rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link id="app-favicon-preload" rel="preload" href="/favicon.png" as="image" />
  <meta name="format-detection" content="telephone=no" />

  <!-- Open Graph & Twitter image tags are declared up here (before the
       pre-React brand-detection script below) so that script can swap
       their `content` attribute on first paint when the user lands on a
       WiseHire URL. The title/description og/twitter tags stay further
       down where React (Index.tsx) keeps them in sync. -->
  <meta id="app-og-image" property="og:image" content="https://wiseresume.app/og/wiseresume-ai-og-fixed.png?v=2">
  <meta id="app-twitter-image" name="twitter:image" content="https://wiseresume.app/og/wiseresume-ai-og-fixed.png?v=2">
  <meta property="og:site_name" content="WiseResume" />
  <meta property="og:url" content="https://wiseresume.app/" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="WiseResume AI social preview" />
  <meta property="og:image:secure_url" content="https://wiseresume.app/og/wiseresume-ai-og-fixed.png?v=2" />

  <script>
    // SPA redirect: restore deep-link path saved by 404.html
    (function () {
      var r = sessionStorage.getItem('spa-redirect');
      if (r) { sessionStorage.removeItem('spa-redirect'); history.replaceState(null, '', r); }
    })();
  </script>
  <script>
    (function () {
      var t = 'system';
      try {
        var raw = localStorage.getItem('wiseresume-settings');
        if (raw) { t = JSON.parse(raw).state.theme || 'system'; }
        else { t = localStorage.getItem('theme') || 'system'; }
      } catch (e) { }
      var resolved = t === 'system'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : t;
      document.documentElement.classList.add(resolved);
      document.documentElement.setAttribute('data-initial-theme', resolved);
      var bg = resolved === 'dark' ? '#111111' : '#ffffff';
      document.documentElement.style.background = bg;
      var s = document.createElement('style');
      s.id = 'pre-react-bg';
      s.textContent = 'body{background:' + bg + '!important;}';
      document.head.appendChild(s);

      try {
        var path = window.location.pathname;

        /* Brand-aware favicon swap: on the landing page the tab icon matches
           the active product. Detected from URL only — no localStorage, no
           host check — so the swap runs before React mounts to avoid a flash.
           Restricted to marketing routes; deeper app pages keep the canonical
           WiseResume favicon. */
        var isLandingRoute = path === '/' || path === '/enterprises';
        if (isLandingRoute) {
          var isWHFavicon = path === '/enterprises' ||
            new URLSearchParams(window.location.search).get('for') === 'companies';
          if (isWHFavicon) {
            var fav = document.getElementById('app-favicon');
            if (fav) fav.setAttribute('href', '/favicon-wisehire.png');
            var favPre = document.getElementById('app-favicon-preload');
            if (favPre) favPre.setAttribute('href', '/favicon-wisehire.png');
            var ogImg = document.getElementById('app-og-image');
            if (ogImg) ogImg.setAttribute('content', '/favicon-wisehire.png');
            var twImg = document.getElementById('app-twitter-image');
            if (twImg) twImg.setAttribute('content', '/favicon-wisehire.png');
          }
        }
      } catch (e) { }
    })();
  </script>

  <style>
    html:not([data-splash-painted="1"]) #pre-react-splash { display: none; }
    #pre-react-splash {
      position: fixed;
      inset: 0;
      z-index: 9998;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--prs-bg, #ffffff);
      color: var(--prs-fg, #0a0a0a);
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    html[data-initial-theme="dark"] #pre-react-splash { --prs-bg: #111111; --prs-fg: #fafafa; }
    #pre-react-splash .prs-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 320px;
      height: 320px;
      transform: translate(-50%, -50%);
      border-radius: 9999px;
      pointer-events: none;
      background: radial-gradient(circle, hsl(357,71%,56%) 0%, transparent 70%);
      opacity: 0.1;
      animation: prs-breathe 2.4s ease-in-out infinite;
    }
    html[data-brand="wisehire"] #pre-react-splash .prs-glow {
      background: radial-gradient(circle, #1D4ED8 0%, transparent 70%);
    }
    #pre-react-splash .prs-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      object-fit: contain;
      position: relative;
    }
    html[data-brand="wisehire"] #pre-react-splash .prs-icon {
      filter: hue-rotate(220deg) saturate(2) brightness(0.85);
    }
    #pre-react-splash .prs-name {
      margin: 20px 0 0 0;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1;
    }
    html[data-brand="wiseresume"] #pre-react-splash .prs-name::before { content: "WiseResume"; }
    html[data-brand="wisehire"] #pre-react-splash .prs-name::before { content: "WiseHire"; color: #1D4ED8; }
    #pre-react-splash .prs-tagline {
      margin: 6px 0 0 0;
      font-size: 0.875rem;
      opacity: 0.65;
    }
    html[data-brand="wiseresume"] #pre-react-splash .prs-tagline::before { content: "Your AI Career Partner"; }
    html[data-brand="wisehire"] #pre-react-splash .prs-tagline::before { content: "Hire Smarter. Screen Faster."; }
    html[data-initial-theme="dark"] #pre-react-splash .prs-tagline { opacity: 0.7; }
    @keyframes prs-breathe {
      0%, 100% { opacity: 0.06; }
      50% { opacity: 0.14; }
    }
    @media (prefers-reduced-motion: reduce) {
      #pre-react-splash .prs-glow { animation: none; opacity: 0.08; }
    }
  </style>

  <!-- Open Graph (og:image is declared higher so the pre-React script can swap it on first paint) -->
  <meta property="og:type" content="website" />

  <!-- Twitter Card (twitter:image is declared higher so the pre-React script can swap it on first paint) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@WiseresumeAI" />
  <meta property="og:title" content="WiseResume AI — AI Resume Builder">
  <meta name="twitter:title" content="WiseResume AI — AI Resume Builder">
  <meta property="og:description"
    content="Build, tailor, and optimize job-winning resumes with AI.">
  <meta name="twitter:description"
    content="Build, tailor, and optimize job-winning resumes with AI.">
</head>

<body style="margin:0;">
  <div id="root"></div>
  <!-- Pre-React splash: brand/visibility driven by html[data-brand] / data-splash-painted set in <head>. -->
  <div id="pre-react-splash" aria-hidden="true">
    <div class="prs-glow"></div>
    <img class="prs-icon" src="/favicon.png" alt="" />
    <h1 class="prs-name"></h1>
    <p class="prs-tagline"></p>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
