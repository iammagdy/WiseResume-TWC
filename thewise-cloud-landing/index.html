<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Wise Cloud</title>
  <link rel="icon" href="https://resume.thewise.cloud/favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8e8f0;
      gap: 0;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    .cat-wrap {
      position: relative;
      margin-bottom: 2rem;
    }
    .cat-wrap img {
      width: 260px;
      height: auto;
      border-radius: 20px;
      box-shadow: 0 0 60px rgba(120, 80, 255, 0.35), 0 0 120px rgba(120, 80, 255, 0.12);
      display: block;
    }

    .brand {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #a78bfa, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.2rem;
      text-align: center;
    }

    .typewriter-wrap {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: #94a3b8;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      margin-bottom: 2.8rem;
      min-height: 2em;
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .typewriter-text {
      display: inline;
    }
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: #a78bfa;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 0.85s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 3rem;
    }
    .links a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1.4rem;
      border-radius: 999px;
      border: 1px solid rgba(167, 139, 250, 0.3);
      color: #c4b5fd;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      background: rgba(167, 139, 250, 0.06);
      transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .links a:hover {
      background: rgba(167, 139, 250, 0.14);
      border-color: rgba(167, 139, 250, 0.6);
      color: #ede9fe;
      box-shadow: 0 0 20px rgba(167, 139, 250, 0.2);
    }
    .links a svg {
      width: 15px;
      height: 15px;
      opacity: 0.7;
      flex-shrink: 0;
    }

    .footer-credit {
      font-size: 0.82rem;
      color: #4b5563;
    }
    .footer-credit a {
      color: #6b7280;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
      border-bottom: 1px dashed #374151;
      padding-bottom: 1px;
    }
    .footer-credit a:hover {
      color: #a78bfa;
      border-bottom-color: #a78bfa;
    }

    .glow-ring {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(120,80,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="glow-ring"></div>

  <div class="cat-wrap">
    <img
      src="https://media.giphy.com/media/ule4vhcY1xEKQ/giphy.gif"
      alt="Cat coding furiously"
      loading="eager"
    />
  </div>

  <div class="brand">The Wise Cloud</div>

  <div class="typewriter-wrap">
    <span class="typewriter-text" id="tw"></span><span class="cursor"></span>
  </div>

  <div class="links">
    <a href="https://resume.thewise.cloud" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      resume.thewise.cloud
    </a>
    <a href="https://quran.thewise.cloud" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      quran.thewise.cloud
    </a>
  </div>

  <p class="footer-credit">Built by <a href="https://magdysaber.com" target="_blank" rel="noopener">Magdy Saber</a></p>

  <script>
    const full = "coming soon...";
    const el = document.getElementById("tw");
    let i = 0;
    function type() {
      if (i <= full.length) {
        el.textContent = full.slice(0, i);
        i++;
        setTimeout(type, i === full.length + 1 ? 3200 : 110);
      } else {
        i = 0;
        setTimeout(type, 400);
      }
    }
    setTimeout(type, 800);
  </script>
</body>
</html>
