version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: React 18 with Vite
  - ui_library: shadcn/ui (Radix UI + Tailwind CSS)
  - other: Supabase, Tanstack Query, Zustand, Framer Motion, Kinde Auth, Capacitor, Vitest

routes:
  - path: /
    file: src/pages/Index.tsx
    auth_required: false
    description: Landing/home page
  - path: /auth
    file: src/pages/AuthPage.tsx
    auth_required: false
    description: Login and registration page
  - path: /sign-in
    file: src/pages/AuthPage.tsx
    auth_required: false
    description: Alias for auth page
  - path: /auth/callback
    file: src/pages/AuthCallbackPage.tsx
    auth_required: false
    description: OAuth callback handler
  - path: /privacy-policy
    file: src/pages/PrivacyPage.tsx
    auth_required: false
    description: Privacy policy page
  - path: /terms-of-service
    file: src/pages/TermsPage.tsx
    auth_required: false
    description: Terms of service page
  - path: /dashboard
    file: src/pages/DashboardPage.tsx
    auth_required: true
    description: Main dashboard showing user resumes
  - path: /editor
    file: src/pages/EditorPage.tsx
    auth_required: true
    description: Resume editor with sections, templates, AI tools
  - path: /preview
    file: src/pages/PreviewPage.tsx
    auth_required: true
    description: Resume preview and PDF export
  - path: /upload
    file: src/pages/UploadPage.tsx
    auth_required: true
    description: Upload and parse PDF/DOCX resume
  - path: /settings
    file: src/pages/SettingsPage.tsx
    auth_required: true
    description: App settings, account, appearance, AI/voice, data export
  - path: /interview
    file: src/pages/InterviewPage.tsx
    auth_required: true
    description: AI-powered mock interview with voice support
  - path: /applications
    file: src/pages/ApplicationsPage.tsx
    auth_required: true
    description: Job application tracker with status management
  - path: /onboarding
    file: src/pages/OnboardingPage.tsx
    auth_required: true
    description: First-time user onboarding flow
  - path: /profile
    file: src/pages/ProfilePage.tsx
    auth_required: true
    description: User profile management
  - path: /templates
    file: src/pages/TemplatesPage.tsx
    auth_required: true
    description: Resume template gallery and selection
  - path: /resume/:id
    file: src/pages/ResumeDetailPage.tsx
    auth_required: true
    description: Resume detail view
  - path: /job/:id
    file: src/pages/JobDetailPage.tsx
    auth_required: true
    description: Job posting detail view
  - path: /application/:id
    file: src/pages/ApplicationTrackerPage.tsx
    auth_required: true
    description: Individual application tracker detail
  - path: /notifications
    file: src/pages/NotificationsPage.tsx
    auth_required: true
    description: User notifications
  - path: /portfolio
    file: src/pages/PortfolioEditorPage.tsx
    auth_required: true
    description: Portfolio editor — username, theme, sections, bio, social links
  - path: /cover-letters
    file: src/pages/CoverLettersPage.tsx
    auth_required: true
    description: Cover letter list management
  - path: /cover-letter/new
    file: src/pages/CoverLetterNewPage.tsx
    auth_required: true
    description: Create new cover letter
  - path: /cover-letter/edit/:id
    file: src/pages/CoverLetterEditPage.tsx
    auth_required: true
    description: Edit existing cover letter
  - path: /examples
    file: src/pages/ExamplesPage.tsx
    auth_required: true
    description: Resume examples gallery
  - path: /career
    file: src/pages/CareerPage.tsx
    auth_required: true
    description: Career tools and resources
  - path: /resignation-letters
    file: src/pages/ResignationLettersPage.tsx
    auth_required: true
    description: Resignation letter management
  - path: /guides
    file: src/pages/GuidesPage.tsx
    auth_required: true
    description: Career guides list
  - path: /guides/:slug
    file: src/pages/GuidePage.tsx
    auth_required: true
    description: Individual career guide
  - path: /ai-studio
    file: src/pages/AIStudioPage.tsx
    auth_required: true
    description: AI tool hub with 18+ AI resume tools
  - path: /help
    file: src/pages/HelpPage.tsx
    auth_required: true
    description: Help and support
  - path: /analytics
    file: src/pages/AnalyticsPage.tsx
    auth_required: true
    description: Resume analytics and insights
  - path: /subscription
    file: src/pages/SubscriptionPage.tsx
    auth_required: true
    description: Subscription plan management
  - path: /referral
    file: src/pages/ReferralPage.tsx
    auth_required: true
    description: Referral program
  - path: /achievements
    file: src/pages/AchievementsPage.tsx
    auth_required: true
    description: User achievements and gamification
  - path: /qr-code
    file: src/pages/QrCodePage.tsx
    auth_required: true
    description: QR code generator for resume
  - path: /share/:token
    file: src/pages/SharePage.tsx
    auth_required: false
    description: Public resume share page
  - path: /p/:username
    file: src/pages/PublicPortfolioPage.tsx
    auth_required: false
    description: Public portfolio page for a user

features:
  - name: User Authentication
    description: Login and registration via Kinde Auth with Supabase session
    files:
      - src/pages/AuthPage.tsx
      - src/hooks/useAuth.ts
      - src/contexts/AuthContext.tsx
    entry_route: /auth
    user_interactions:
      - Fill email input
      - Fill password input
      - Click Sign In or Sign Up button
      - See error message on invalid credentials
      - Redirect to dashboard on success
    api_calls:
      - method: POST
        endpoint: Kinde Auth OAuth
    auth_required: false

  - name: Resume Dashboard
    description: View and manage all user resumes, create new ones
    files:
      - src/pages/DashboardPage.tsx
      - src/hooks/useResumes.ts
    entry_route: /dashboard
    user_interactions:
      - View resume cards
      - Click Create New Resume button
      - Click on existing resume card to open editor
      - Delete resume from card menu
    api_calls:
      - method: GET
        endpoint: /rest/v1/resumes
      - method: POST
        endpoint: /rest/v1/resumes
    auth_required: true

  - name: Resume Editor
    description: Full-featured resume editor with sections, AI tools, templates, and auto-save
    files:
      - src/pages/EditorPage.tsx
      - src/components/editor/
      - src/store/resumeStore.ts
    entry_route: /editor
    user_interactions:
      - Edit contact info, summary, experience, education, skills sections
      - Switch resume template
      - Click AI tool buttons to open AI sheets
      - Auto-save triggers on change
      - Undo/redo changes
    api_calls:
      - method: POST
        endpoint: /rest/v1/resumes (upsert)
      - method: POST
        endpoint: /functions/v1/tailor-resume
    auth_required: true

  - name: Resume Upload & Parsing
    description: Upload PDF or DOCX resume and parse it with AI
    files:
      - src/pages/UploadPage.tsx
      - src/lib/pdf/
    entry_route: /upload
    user_interactions:
      - Drag and drop or click to upload PDF/DOCX file
      - See progress indicator during parsing
      - View parsed resume data
      - Click Continue to open in editor
    api_calls:
      - method: POST
        endpoint: /functions/v1/parse-resume
    auth_required: true

  - name: AI Studio
    description: Hub for 18+ AI-powered resume tools
    files:
      - src/pages/AIStudioPage.tsx
      - src/components/editor/TailorSheet.tsx
      - src/components/editor/JobAnalysisSheet.tsx
      - src/components/editor/ATSScanSheet.tsx
      - src/components/editor/AgenticChatSheet.tsx
    entry_route: /ai-studio
    user_interactions:
      - Browse AI tool cards
      - Click tool card to open sheet
      - Enter job description or resume context
      - Click Generate/Analyze button
      - View AI results
    api_calls:
      - method: POST
        endpoint: /functions/v1/tailor-resume
      - method: POST
        endpoint: /functions/v1/ai-action
    auth_required: true

  - name: Mock Interview
    description: AI-powered mock interview with voice input/output
    files:
      - src/pages/InterviewPage.tsx
      - src/components/interview/
      - src/hooks/useVoiceInterview.ts
    entry_route: /interview
    user_interactions:
      - Select interview mode (general, job-targeted, quick practice)
      - Click Launch Interview button
      - Speak answer or type answer
      - Click record button to start/stop recording
      - View transcript of conversation
      - See grading summary after interview ends
    api_calls:
      - method: POST
        endpoint: Agentic chat AI endpoint
    auth_required: true

  - name: Job Application Tracker
    description: Track job applications with status management and analytics
    files:
      - src/pages/ApplicationsPage.tsx
      - src/hooks/useJobApplications.ts
      - src/hooks/useJobs.ts
    entry_route: /applications
    user_interactions:
      - View application cards by status
      - Click Add Application button
      - Change application status (Applied, Interviewing, Offered, Rejected)
      - Search and filter applications
      - View analytics and streaks
    api_calls:
      - method: GET
        endpoint: /rest/v1/job_applications
      - method: POST
        endpoint: /rest/v1/job_applications
      - method: PATCH
        endpoint: /rest/v1/job_applications
    auth_required: true

  - name: Portfolio Editor
    description: Create and customize a public portfolio page with username and theme
    files:
      - src/pages/PortfolioEditorPage.tsx
      - src/components/portfolio/editor/
    entry_route: /portfolio
    user_interactions:
      - Set username (availability check)
      - Toggle portfolio visibility on/off
      - Edit bio and social links
      - Switch theme and layout
      - Click Save button
    api_calls:
      - method: GET
        endpoint: /rest/v1/profiles
      - method: PATCH
        endpoint: /rest/v1/profiles
    auth_required: true

  - name: Public Portfolio
    description: View public portfolio page for any user
    files:
      - src/pages/PublicPortfolioPage.tsx
      - src/hooks/usePublicPortfolio.ts
    entry_route: /p/:username
    user_interactions:
      - View user name, headline, bio
      - Browse experience, education, skills sections
      - See open to work badge if enabled
      - Download resume button
    api_calls:
      - method: GET
        endpoint: /rest/v1/profiles
    auth_required: false

  - name: Settings
    description: App settings including account, appearance (theme), AI/voice, and data export
    files:
      - src/pages/SettingsPage.tsx
      - src/components/settings/
    entry_route: /settings
    user_interactions:
      - View and edit profile
      - Change app theme (Light/Dark/System)
      - Export account data
      - Set BYOK AI key
      - Set ElevenLabs voice key
      - Sign out
    api_calls:
      - method: GET
        endpoint: /rest/v1/profiles
      - method: PATCH
        endpoint: /rest/v1/profiles
    auth_required: true

  - name: Resume PDF Export
    description: Export resume as PDF with pagination and formatting
    files:
      - src/pages/PreviewPage.tsx
      - src/lib/pdf/
    entry_route: /preview
    user_interactions:
      - View resume preview
      - Click Download PDF button
      - See progress during PDF generation
    api_calls: []
    auth_required: true

  - name: Cover Letters
    description: Create and manage AI-generated cover letters
    files:
      - src/pages/CoverLettersPage.tsx
      - src/pages/CoverLetterNewPage.tsx
      - src/pages/CoverLetterEditPage.tsx
    entry_route: /cover-letters
    user_interactions:
      - View list of cover letters
      - Click Create New button
      - Enter job description and position
      - Generate cover letter with AI
      - Edit generated content
      - Save cover letter
    api_calls:
      - method: POST
        endpoint: /functions/v1/ai-action
    auth_required: true

  - name: Onboarding
    description: Multi-step onboarding for new users
    files:
      - src/pages/OnboardingPage.tsx
    entry_route: /onboarding
    user_interactions:
      - Select career level
      - Click Next to proceed to next step
      - Complete onboarding to go to dashboard
    api_calls:
      - method: PATCH
        endpoint: /rest/v1/profiles
    auth_required: true

known_limitations:
  - issue: Interview voice features require browser microphone permission and Web Speech API support
    location: src/pages/InterviewPage.tsx
    impact: Voice input unavailable in browsers without Speech Recognition API
  - issue: ElevenLabs TTS is optional and requires BYOK key
    location: src/hooks/useVoiceInterview.ts
    impact: Falls back to Web Speech Synthesis if no ElevenLabs key
  - issue: Biometric lock only works on native Capacitor platform
    location: src/hooks/useBiometricLock.ts
    impact: Biometric settings are hidden on web
  - issue: PDF export uses canvas rendering which may differ slightly per browser
    location: src/lib/pdf/
    impact: Minor visual differences in exported PDFs
