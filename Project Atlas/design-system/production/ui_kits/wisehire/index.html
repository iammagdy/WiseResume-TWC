<!doctype html>
<html lang="en" data-screen-label="WiseHire UI Kit">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WiseHire — UI Kit</title>
  <link rel="icon" href="../../assets/wisehire-favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body style="margin:0;">

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Pipeline.jsx"></script>
<script type="text/babel" src="BulkScreen.jsx"></script>
<script type="text/babel" src="JDWriter.jsx"></script>

<script type="text/babel">
  const { useState } = React;

  function App() {
    const [screen, setScreen] = useState('dashboard');

    function go(s) {
      // Map every nav id to a screen we have, or default to dashboard
      if (['pipeline','bulk','jd','dashboard'].includes(s)) setScreen(s);
      else setScreen('dashboard');
    }

    let body;
    switch (screen) {
      case 'pipeline': body = <Pipeline />; break;
      case 'bulk':     body = <BulkScreen />; break;
      case 'jd':       body = <JDWriter />; break;
      default:         body = <WHDashboard
        onOpenPipeline={() => setScreen('pipeline')}
        onOpenBulk={() => setScreen('bulk')}
        onOpenJD={() => setScreen('jd')} />;
    }

    const labels = {
      dashboard: 'Dashboard',
      pipeline: 'Pipeline',
      bulk: 'Bulk Screen',
      jd: 'JD Writer'
    };

    return (
      <div className="wh-shell" data-screen-label={labels[screen] || 'Dashboard'}>
        <WHSidebar active={screen} onNavigate={go} />
        <div className="wh-main">{body}</div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
