<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Brand Logos</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; background: hsl(var(--bg-h)); color: hsl(var(--fg-h)); font-family: var(--font-sans); }
  body { padding: 22px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card-bg { background: hsl(var(--card-h)); border: 1px solid hsl(var(--border-h)); border-radius: 16px; padding: 22px 20px; display: flex; align-items: center; gap: 16px; }
  .card-bg.dark { background: #161618; border-color: #2A2A30; color: #f4f4f5; }
  .card-bg img { width: 56px; height: 56px; border-radius: 14px; }
  .brand-name { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .brand-name.crimson { color: #9E1B22; }
  .brand-name.blue { color: #1D4ED8; }
  .brand-tag { font-size: 11px; color: var(--muted-fg); margin-top: 2px; }
  .card-bg.dark .brand-tag { color: rgb(255 255 255 / 0.55); }
</style>
</head>
<body>
  <div class="grid">
    <div class="card-bg">
      <img src="../assets/wiseresume-logo-light.webp" alt="WiseResume" />
      <div>
        <div class="brand-name crimson">WiseResume</div>
        <div class="brand-tag">Your AI Career Partner</div>
      </div>
    </div>
    <div class="card-bg dark">
      <img src="../assets/wiseresume-logo-dark.webp" alt="WiseResume dark" />
      <div>
        <div class="brand-name crimson">WiseResume</div>
        <div class="brand-tag">Your AI Career Partner</div>
      </div>
    </div>
    <div class="card-bg">
      <img src="../assets/wisehire-favicon.png" alt="WiseHire" style="width:48px;height:48px;" />
      <div>
        <div class="brand-name blue">WiseHire</div>
        <div class="brand-tag">Hire Smarter. Screen Faster.</div>
      </div>
    </div>
    <div class="card-bg dark">
      <img src="../assets/wisehire-favicon.png" alt="WiseHire dark" style="width:48px;height:48px;" />
      <div>
        <div class="brand-name blue" style="color:#60A5FA">WiseHire</div>
        <div class="brand-tag">Hire Smarter. Screen Faster.</div>
      </div>
    </div>
  </div>
</body>
</html>
