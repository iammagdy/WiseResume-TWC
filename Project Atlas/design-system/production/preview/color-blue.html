<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>WiseHire Royal Blue Scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:#18181b;font-family:var(--font-sans);}
  body{padding:20px;}
  .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#1D4ED8;margin:0 0 10px;}
  .row{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;}
  .sw{aspect-ratio:1;border-radius:10px;display:flex;align-items:flex-end;padding:8px;color:#fff;font-size:10px;font-weight:600;font-family:var(--font-mono);}
  .sw.light{color:#1D4ED8;}
  .name{font-size:9px;opacity:0.85;}
  .pair{font-size:10.5px;color:#475569;margin-top:14px;display:flex;gap:18px;flex-wrap:wrap;}
  .pair b{color:#0f172a;font-weight:600;}
  .chip{padding:4px 10px;border-radius:999px;background:#f0f5ff;border:1px solid rgba(29,78,216,0.22);color:#1D4ED8;font-weight:600;font-size:11px;}
</style>
</head>
<body>
  <div class="eyebrow">WiseHire — Royal Blue</div>
  <div class="row">
    <div class="sw light" style="background:#f0f5ff;border:1px solid #dbeafe"><div><div class="name">50</div>F0F5FF</div></div>
    <div class="sw light" style="background:#dbeafe"><div><div class="name">100</div>DBEAFE</div></div>
    <div class="sw light" style="background:#93c5fd"><div><div class="name">300</div>93C5FD</div></div>
    <div class="sw" style="background:#60a5fa"><div><div class="name">400</div>60A5FA</div></div>
    <div class="sw" style="background:#3B82F6;outline:2px solid #18181b;outline-offset:2px"><div><div class="name">500 · accent</div>3B82F6</div></div>
    <div class="sw" style="background:#2563eb"><div><div class="name">600</div>2563EB</div></div>
    <div class="sw" style="background:#1D4ED8;outline:2px solid #18181b;outline-offset:2px"><div><div class="name">700 · brand</div>1D4ED8</div></div>
    <div class="sw" style="background:#1e3a8a"><div><div class="name">900</div>1E3A8A</div></div>
  </div>
  <div class="pair">
    <span><b>Token</b> <code style="font-family:var(--font-mono);font-size:11px">--wh-primary: 224 76% 48%</code></span>
    <span><b>Accent</b> #3B82F6</span>
    <span><b>Page bg</b> #f0f5ff / #060912</span>
    <span class="chip">Now in early access</span>
  </div>
</body>
</html>
