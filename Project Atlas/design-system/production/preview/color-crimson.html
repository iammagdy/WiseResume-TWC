<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>WiseResume Crimson Scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:#18181b;font-family:var(--font-sans);}
  body{padding:20px;}
  .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#9E1B22;margin:0 0 10px;}
  .row{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;}
  .sw{aspect-ratio:1;border-radius:10px;display:flex;align-items:flex-end;justify-content:flex-start;padding:8px;color:#fff;font-size:10px;font-weight:600;font-family:var(--font-mono);}
  .sw.light{color:#9E1B22;}
  .name{font-size:9px;opacity:0.85;}
  .pair{font-size:10.5px;color:#52525b;margin-top:14px;display:flex;gap:18px;flex-wrap:wrap;}
  .pair b{color:#18181b;font-weight:600;}
  .chip{padding:4px 10px;border-radius:999px;background:#fff5f5;border:1px solid rgba(158,27,34,0.2);color:#9E1B22;font-weight:600;font-size:11px;}
</style>
</head>
<body>
  <div class="eyebrow">WiseResume — Crimson</div>
  <div class="row">
    <div class="sw light" style="background:#fff5f5;border:1px solid #ffe5e5"><div><div class="name">50</div>FFF5F5</div></div>
    <div class="sw light" style="background:#ffe5e5"><div><div class="name">100</div>FFE5E5</div></div>
    <div class="sw" style="background:#f87878"><div><div class="name">300</div>F87878</div></div>
    <div class="sw" style="background:#E53E3E"><div><div class="name">500</div>E53E3E</div></div>
    <div class="sw" style="background:#C41E3A"><div><div class="name">600</div>C41E3A</div></div>
    <div class="sw" style="background:#9E1B22;outline:2px solid #18181b;outline-offset:2px"><div><div class="name">700 · brand</div>9E1B22</div></div>
    <div class="sw" style="background:#7a1218"><div><div class="name">800</div>7A1218</div></div>
    <div class="sw" style="background:#4a0a0e"><div><div class="name">900</div>4A0A0E</div></div>
  </div>
  <div class="pair">
    <span><b>Token</b> <code style="font-family:var(--font-mono);font-size:11px">--primary: 357 71% 36%</code></span>
    <span><b>Hover</b> primary/90</span>
    <span><b>Press</b> primary/80</span>
    <span class="chip">AI-Powered</span>
  </div>
</body>
</html>
