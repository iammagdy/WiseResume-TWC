<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:#18181b;font-family:var(--font-sans);}
  body{padding:22px;}
  .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#9E1B22;margin:0 0 14px;}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .box{width:64px;height:64px;background:linear-gradient(135deg,#fff5f5,#ffe5e5);border:1px solid #f5cbcb;}
  .name{font-family:var(--font-mono);font-size:11px;font-weight:600;color:#18181b;}
  .val{font-family:var(--font-mono);font-size:10px;color:#6b7280;}
  .where{font-size:10px;color:#6b7280;text-align:center;line-height:1.35;max-width:80px;}
</style>
</head>
<body>
  <div class="eyebrow">Radii · Always rounded</div>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">sm · 4px</div><div class="where">tooltip · kbd</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">md · 8px</div><div class="where">small chip</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">lg · 12px</div><div class="where">input · btn-sm · list item</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">xl · 16px</div><div class="where">button · sheet · nav item</div></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><div class="name">2xl · 20px</div><div class="where">card · hero panel</div></div>
    <div class="item"><div class="box" style="border-radius:9999px"></div><div class="name">full</div><div class="where">badge · pill · avatar</div></div>
  </div>
</body>
</html>
