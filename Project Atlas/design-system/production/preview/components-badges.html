<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Badges & Chips</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html,body{margin:0;background:#fff;color:#18181b;font-family:var(--font-sans);-webkit-font-smoothing:antialiased;}
  body{padding:22px 24px;display:flex;flex-direction:column;gap:14px;}
  .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#9E1B22;margin:0;}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid transparent;}
  .badge [data-lucide]{width:11px;height:11px;}
  .b-primary{background:#9E1B22;color:#fff;}
  .b-secondary{background:#e2e8f0;color:#0f172a;}
  .b-outline{background:#fff;color:#18181b;border-color:#e5e7eb;}
  .b-success{background:rgba(34,197,94,0.12);color:#16a34a;}
  .b-warn{background:rgba(245,158,11,0.14);color:#b45309;}
  .b-error{background:rgba(239,68,68,0.12);color:#dc2626;}
  .b-info{background:rgba(59,130,246,0.12);color:#2563eb;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;background:rgb(158 27 34 / 0.08);color:#9E1B22;border:1px solid rgb(158 27 34 / 0.22);}
  .pill [data-lucide]{width:13px;height:13px;}
  .pill.wh{background:rgb(29 78 216 / 0.08);color:#1D4ED8;border-color:rgb(29 78 216 / 0.22);}
  .live::before{content:"";width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 3px rgb(34 197 94 / 0.2);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:500;background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;}
  .chip [data-lucide]{width:12px;height:12px;color:#9ca3af;}
  .plan{display:inline-flex;align-items:center;gap:6px;padding:4px 10px 4px 7px;border-radius:999px;font-size:11px;font-weight:700;background:linear-gradient(135deg,#fde68a,#f59e0b);color:#78350f;}
  .plan [data-lucide]{width:12px;height:12px;}
  .label{font-family:var(--font-mono);font-size:10.5px;color:#6b7280;min-width:88px;}
</style>
</head>
<body>
  <div class="eyebrow">Badges & Chips</div>
  <div class="row">
    <div class="label">badge</div>
    <span class="badge b-primary">AI</span>
    <span class="badge b-secondary">Draft</span>
    <span class="badge b-outline">Sent</span>
    <span class="badge b-success"><i data-lucide="check"></i>ATS 87</span>
    <span class="badge b-warn"><i data-lucide="alert-triangle"></i>3 gaps</span>
    <span class="badge b-error">Failed</span>
    <span class="badge b-info">New</span>
  </div>
  <div class="row">
    <div class="label">pill</div>
    <span class="pill"><i data-lucide="sparkles"></i>AI-Powered Career Platform</span>
    <span class="pill wh live">Now in early access</span>
    <span class="plan"><i data-lucide="star"></i>Pro</span>
  </div>
  <div class="row">
    <div class="label">chip</div>
    <span class="chip">React <i data-lucide="x"></i></span>
    <span class="chip">TypeScript <i data-lucide="x"></i></span>
    <span class="chip">Figma <i data-lucide="x"></i></span>
    <span class="chip" style="border-style:dashed;color:#9ca3af"><i data-lucide="plus"></i>Add skill</span>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
