<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Shadow Tiers</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#F7F7F8;color:#18181b;font-family:var(--font-sans);}
  body{padding:32px 22px 36px;}
  .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#9E1B22;margin:0 0 18px;}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{width:80px;height:54px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;}
  .s1{box-shadow:0 1px 2px 0 rgb(0 0 0 / 0.04);}
  .s2{box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.06), 0 1px 2px -1px rgb(0 0 0 / 0.06);}
  .s3{box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.07), 0 2px 4px -2px rgb(0 0 0 / 0.05);}
  .s4{box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.04);}
  .s5{box-shadow:0 20px 25px -5px rgb(0 0 0 / 0.08), 0 8px 10px -6px rgb(0 0 0 / 0.04);}
  .glow{box-shadow:0 4px 14px -2px rgb(158 27 34 / 0.35); border-color:transparent;background:#9E1B22;}
  .name{font-family:var(--font-mono);font-size:10.5px;font-weight:600;}
  .where{font-size:10px;color:#6b7280;text-align:center;}
</style>
</head>
<body>
  <div class="eyebrow">Shadows · soft-* tiers + glow</div>
  <div class="row">
    <div class="item"><div class="box s1"></div><div class="name">soft-sm</div><div class="where">subtle outline</div></div>
    <div class="item"><div class="box s2"></div><div class="name">soft</div><div class="where">card default</div></div>
    <div class="item"><div class="box s3"></div><div class="name">soft-md</div><div class="where">elevated</div></div>
    <div class="item"><div class="box s4"></div><div class="name">soft-lg</div><div class="where">menu · popover</div></div>
    <div class="item"><div class="box s5"></div><div class="name">soft-xl</div><div class="where">modal · sheet</div></div>
    <div class="item"><div class="box glow"></div><div class="name">glow-primary</div><div class="where">CTA halo</div></div>
  </div>
</body>
</html>
