<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type — Display & Headlines</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#fff;color:#18181b;font-family:var(--font-sans);}
  body{padding:22px 24px;}
  .row{display:flex;align-items:baseline;gap:14px;padding:6px 0;border-bottom:1px solid #f1f1f4;}
  .row:last-child{border-bottom:0;}
  .label{font-family:var(--font-mono);font-size:10.5px;color:#6b7280;width:130px;flex-shrink:0;}
  .sample{flex:1;line-height:1.04;}
  .display-1{font-weight:800;font-size:48px;letter-spacing:-0.035em;}
  .display-2{font-weight:800;font-size:34px;letter-spacing:-0.035em;}
  .h1{font-weight:700;font-size:26px;letter-spacing:-0.02em;}
  .h2{font-weight:600;font-size:20px;letter-spacing:-0.01em;}
  .h3{font-weight:600;font-size:17px;}
</style>
</head>
<body>
  <div class="row"><div class="label">display-1 · 800/48</div><div class="sample display-1">Stand out as a <span style="background:linear-gradient(135deg,#E53E3E,#FF6B6B 25%,#C41E3A 50%,#FF8080 75%,#9E1B22);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">Software Engineer</span>.</div></div>
  <div class="row"><div class="label">display-2 · 800/34</div><div class="sample display-2">Hire Smarter. <span style="color:#1D4ED8">Screen Faster.</span></div></div>
  <div class="row"><div class="label">h1 · 700/26</div><div class="sample h1">Optimize your resume. Get more interviews.</div></div>
  <div class="row"><div class="label">h2 · 600/20</div><div class="sample h2">Jump back in</div></div>
  <div class="row"><div class="label">h3 · 600/17</div><div class="sample h3">AI-Powered Resume Writing</div></div>
</body>
</html>
