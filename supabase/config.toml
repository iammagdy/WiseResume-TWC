# `x-admin-wisehire-op` header fallback. Single `requireAdminAuth`
# runs at the top of the router (per task spec). Each sub-handler
# preserves its original parse-vs-validation semantics, audit-log
# category/action strings, and email-trigger behaviour byte-for-byte.
# Originals stay deployed alongside for the 24-hour soak; deletion is
# handled by the downstream platform task.
[functions.admin-wisehire]
  verify_jwt = false

# --- Coupons consolidation (Task #48) ---
# admin-manage-coupons, redeem-coupon, validate-coupon were merged into
# the `coupons` router on 2026-05-03 to free 2 slots under the
# 100-function project limit. Dispatch is HEADER-based: web clients
# POST the original per-handler body to /functions/v1/coupons with
# `x-coupons-action: admin-manage|redeem|validate` so each sub-handler
# keeps its original parse-vs-auth ordering and error envelope.
# Originals stay deployed alongside for the 24-hour soak; deletion is
# handled by the downstream platform task.
[functions.coupons]
  verify_jwt = false

# --- Transactional email consolidation (Task #55) ---
# send-contact-email, submit-contact-request, and send-resume-reminder
# were merged into the `transactional-email` router on 2026-05-03 to
# free 2 slots under the 100-function project limit. Dispatch is
# body.action ∈ {contact-email, contact-request, resume-reminder}
# with an `x-transactional-email-action` header fallback. NO single
# auth gate runs at the top — each handler keeps its original auth
# posture: contact-email and contact-request stay public (with
# internal Bearer-based user resolution + IP/user rate limiting and
# honeypot), resume-reminder stays cron-secret-gated via
# `requireCronSecret`. Each handler preserves its original
# parse-vs-validation semantics, response shape, status codes, and
# email content (subject, from, to, html body, text body)
# byte-for-byte against its pre-merge function. Originals stay
# deployed alongside for the 24-hour soak; deletion is handled by
# the downstream platform task. The pg_cron job that calls
# send-resume-reminder is re-pointed at transactional-email in
# migration 20260503000002_repoint_resume_reminder_cron.sql so cron
# parity is preserved across the eventual delete.
# Explicitly excluded (kept isolated): send-password-reset (auth
# critical), send-push (different SDK / mobile-api), auth-email-hook
# (Supabase posts to a fixed URL with HMAC signature).
[functions.transactional-email]
  verify_jwt = false

# --- Phase 2 reconciliation (Task #66, 2026-05-03) ---
# Supabase is the sole source of truth for verify_jwt. The four blocks
# below were missing from config.toml even though the functions ARE
# deployed (audit re-confirmed 2026-05-03 via Management API: all four
# ACTIVE, all four `verify_jwt=true`). The previous NOTE claiming they
# were "never deployed" was stale — the source dirs DO exist and are
# in 1:1 sync with deployed slugs. Recording the deployed truth here.
#
# NB: `verify_jwt=true` for `revenuecat-webhook`, `send-push`, and
# `mobile-config` is INCONSISTENT with their source-level auth posture
# (RevenueCat shared-secret in Authorization header, EDGE_INTERNAL_TOKEN
# in `x-internal-token` header, and anonymous-by-design respectively).
# The Supabase gateway is currently rejecting their real callers before
# the handler runs. Tracked as Phase 3 follow-up (Task #67) — do NOT
# flip these to `false` here without coordinated handler verification.
[functions.export-portfolio-pdf]
  verify_jwt = true
[functions.mobile-config]
  verify_jwt = true
[functions.revenuecat-webhook]
  verify_jwt = true
[functions.send-push]
  verify_jwt = true
# editor-ai: verify_jwt=true matches deployed value (Management API confirmed
# 2026-05-05). Callers supply a Supabase JWT; the Supabase gateway verifies it
# before the handler runs. Dispatch is via x-editor-ai-action header.
[functions.editor-ai]
  verify_jwt = true
