# --- Mobile app (Task #34: Expo SDK 51 native client) ---
# Six mobile-only endpoints (register-push-token, 3× export-*-pdf,
# 2× interview-*) were consolidated into the `mobile-api` router on
# 2026-05-03 to stay under Supabase's 100-function project limit.
# Mobile clients now POST `{action, ...}` to /functions/v1/mobile-api.
[functions.mobile-api]
  verify_jwt = false

# --- Admin config consolidation (Task #52) ---
# admin-get-settings, admin-update-settings, admin-feature-flags,
# admin-integrations, and admin-env-check were merged into the
# `admin-config` router on 2026-05-03 to free 4 slots under the
# 100-function project limit. Dispatch is body.action ∈ {get-settings,
# update-settings, feature-flags, integrations, env-check} with a
# `x-admin-config-action` header fallback used by feature-flags and
# integrations (whose original handlers read body.action for their own
# inner sub-routing — list/upsert/delete and get_resend_bounces/
# get_deploy_status/trigger_deploy respectively, so the router cannot
# clobber body.action without breaking byte-for-byte parity). Single
# `assertAdmin` runs at the top of the router; each sub-handler
# preserves its original parse-vs-validation semantics. Originals stay
# deployed alongside for the 24-hour soak; deletion is handled by the
# downstream platform task. NB: env-check's REQUIRED_ENV_VARS list is
# security-relevant and must remain byte-for-byte identical to the
# original — do NOT add or remove keys here.
[functions.admin-config]
  verify_jwt = false

# --- Admin AI control-plane consolidation (Task #53) ---
# admin-ai-caps, admin-ai-routing, inspect-ai-keys, and
# refresh-ai-test-models were merged into the `admin-ai-ops` router on
# 2026-05-03 to free 3 slots under the 100-function project limit.
# Dispatch is body.action ∈ {caps, routing, inspect-keys,
# refresh-test-models} with an `x-admin-ai-op` header fallback used by
# `caps` and `routing` (whose original handlers read body.action for
# their own inner sub-routing — get_caps/set_plan_cap/... and
# get_config/update_feature/... respectively, so the router cannot
# clobber body.action without breaking byte-for-byte parity). Single
# `requireAdminAuth` runs at the top of the router for caps / routing
# / inspect-keys; refresh-test-models keeps its original dual-mode
# auth (x-cron-secret OR admin) so the nightly pg_cron job still
# works. Originals stay deployed alongside for the 24-hour soak;
# deletion is handled by the downstream platform task. The pg_cron
# job that calls refresh-ai-test-models is re-pointed at admin-ai-ops
# in migration 20260503000001_repoint_refresh_ai_test_models_cron.sql
# so cron parity is preserved across the eventual delete.
[functions.admin-ai-ops]
  verify_jwt = false

